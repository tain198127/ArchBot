    label: contextMenu.delete
    executor: backend
    command: fs_delete
    input:
      path: "${params.filePath}"
    confirm: contextMenu.confirmDelete

  # ── UI ──
  - id: ui.refreshPanel
    label: ""
    executor: frontend
    handler: ui.refreshPanel
    input:
      panelId: "${params.panelId}"
