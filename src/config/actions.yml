# ═══════════════════════════════════════════════════════════════
# ArchBot 动作定义
# 声明每个动作的 id、执行器类型、输入参数、结果处理
# ═══════════════════════════════════════════════════════════════
version: "1.0"

actions:
  # ── Project ──
  - id: project.open
    label: menuFile.openProject
    executor: backend
    command: open_project
    input:
      path: "${params.path}"
    result:
      storeAs: project.current
      notify: true

  - id: project.create
    label: menuFile.newProject
    executor: backend
    command: create_project
    input:
      dir: "${params.dir}"
      name: "${params.name}"

  - id: project.close
    label: menuFile.closeProject
    executor: frontend
    handler: project.close

  - id: project.save
    label: menuFile.saveProject
    executor: frontend
    handler: project.save

  - id: project.saveAs
    label: menuFile.saveAsProject
    executor: frontend
    handler: project.saveAs

  - id: project.openRemote
    label: menuFile.openRemoteProject
    executor: frontend
    handler: project.openRemote

  # ── Editor ──
  - id: editor.openFile
    label: contextMenu.open
    executor: frontend
    handler: editor.openFile
    input:
      filePath: "${params.filePath}"

  - id: editor.find
    label: menuEdit.find
    executor: frontend
    handler: editor.find

  - id: editor.replace
    label: menuEdit.replace
    executor: frontend
    handler: editor.replace

  - id: editor.goTo
    label: menuEdit.goTo
    executor: frontend
    handler: editor.goTo

  - id: editor.cut
    label: menuEdit.cut
    executor: frontend
    handler: editor.cut

  - id: editor.copy
    label: menuEdit.copy
    executor: frontend
    handler: editor.copy

  - id: editor.format
    label: menuEdit.format
    executor: frontend
    handler: editor.format

  # ── Config ──
  - id: config.openDigitalEmployee
    label: menuConfig.digitalEmployee
    executor: frontend
    handler: config.openDigitalEmployee

  - id: config.openBusinessFlow
    label: menuConfig.businessFlow
    executor: frontend
    handler: config.openBusinessFlow

  - id: config.openSharedDocs
    label: menuConfig.sharedDocs
    executor: frontend
    handler: config.openSharedDocs

  - id: config.openImIntegration
    label: menuConfig.imIntegration
    executor: frontend
    handler: config.openImIntegration

  - id: config.openAgentConfig
    label: menuConfig.agentConfig
    executor: frontend
