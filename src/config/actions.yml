  - id: config.openScenario
    label: menuConfig.scenario
    executor: frontend
    handler: config.openScenario

  - id: config.openSystem
    label: menuConfig.system
    executor: frontend
    handler: config.openSystem

  # ── Settings ──
  - id: settings.clearCache
    label: menuFile.clearCache
    executor: frontend
    handler: settings.clearCache

  # ── License ──
  - id: license.openDialog
    label: license.register
    executor: frontend
    handler: license.openDialog

  # ── Run ──
  - id: run.terminal
    label: menuRun.terminal
    executor: frontend
    handler: run.terminal

  - id: run.genRequirement
