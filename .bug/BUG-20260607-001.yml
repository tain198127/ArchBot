id: BUG-20260607-001
title: WKWebView 拦截 HTML5 拖拽事件导致流程编辑器 palette→canvas 拖拽完全失效
status: resolved
severity: critical
date_created: 2026-06-07
date_resolved: 2026-06-07
environment:
  os: macOS 24.6.0 (Darwin)
  tauri: v2
  webview: WKWebView (WebKit)
  vue-flow: 1.48.2
  tailwind: 4.3.0
steps_to_reproduce:
  - 启动 Tauri 应用 (tauri dev)
  - 配置 → 业务流 → 点击已有流程或新建流程
  - 从左侧工具面板拖拽任意节点到中间画布（用鼠标真实拖拽）
actual_behavior:
  - 拖拽时 `dragstart` 事件正常触发（日志可见）
  - 但 `dragover` 和 `drop` 事件完全不会触发
  - 鼠标显示"禁止放置"图标
  - 无论怎么拖拽，画布上只出现 Start 和 End 两个默认节点
expected_behavior:
  - 从左侧面板拖拽节点到画布后，节点应立即显示在画布上
  - 支持所有节点类型：start, end, agent, gateway, employee, skill, reference 等
root_cause: |
  WKWebView（macOS 系统 WebView）在 OS 层面对 HTML5 原生拖拽 API 进行了拦截。
  具体表现为:
  1. `dragstart` 事件能正常触发并执行 JS handler
  2. 但 `dragover` 和 `drop` 事件被 WKWebView 原生拖放处理完全消费，
     从未传递到 JavaScript 层
  3. `-webkit-user-drag: none` CSS 属性、`dataTransfer` MIME type 绕过、
     VueFlow 组件上的 @dragover/@drop 绑定均无效
  4. 这是 WebKit 的安全机制，不是 Tauri 的 bug

  验证方法: 使用 `dispatchEvent` 模拟拖拽（绕过 OS 层），节点创建完全正常，
  证明 JS 层逻辑无误。
fix_description: |
  彻底放弃 HTML5 原生 DnD API（draggable + dragstart/dragover/drop），
  改用 mouse 事件体系实现自绘拖拽:

  1. palette 项: `draggable="true"` + `@dragstart` → `@mousedown`
  2. mousedown: 存储拖拽上下文到闭包 `_dragCtx`，创建跟随鼠标的视觉 ghost 元素
  3. window.mousemove: 更新 ghost 位置
  4. window.mouseup: 移除 ghost，检测鼠标是否在 `.vue-flow__pane` 内，
     若是则调用 `screenToFlowCoordinate` + `addNodes` 创建节点

  新方案优点:
  - 完全绕过 WKWebView 拦截
  - 保留视觉反馈（蓝色 ghost 标签跟随鼠标）
  - 节点创建走 VueFlow 正确的 change pipeline (addNodes)
  - 支持所有节点类型 + employee 多字段传递
files_changed:
  - path: src/components/domain/business-flow/BusinessFlowEditorPanel.vue
    lines_changed: "~200 行 (重写整个 DnD 子系统)"
    details:
      - "移除所有 HTML5 DnD 相关: draggable, @dragstart, @dragover, @drop, onDragStart, onDragOver, onDropExtended"
      - "移除 bindPaneDnd/unbindPaneDnd (原生 addEventListener + rAF 重试)"
      - "移除 -webkit-user-drag CSS 修复尝试"
      - "新增 mouse 事件系统: onPaletteMouseDown, onPaletteMouseDownEmployee, onWindowMouseMove, onWindowMouseUp"
      - "新增 createDragGhost: 创建蓝色跟随标签提供拖拽视觉反馈"
      - "新增 getDefaultNodeData: 节点默认数据工厂函数"
      - "palette 模板: 14 处 draggable → @mousedown 替换"
      - "VueFlow 组件: 移除 @dragover @drop 绑定"
verification: |
  用户手动测试确认：从左侧面板拖拽硅基军团员工到画布，节点成功创建并显示。
  
  [DnD] 日志链路确认:
  - [DnD] mousedown — 拖拽开始
  - [DnD] mouseup | type=employee — 释放
  - [DnD] ✅ node ADDED | id=employee-xxx — 节点已创建

  并发修复 (本条缺陷修复过程中同步完成):
  - DB 初始化: flowStore.init() 先调 de_init 确保 DB 连接
  - menu 解锁: menus.yml 移除 config.disabledWhen 限制
  - 名称编辑: flowData.name 改为可编辑 input
  - 名称去重: bf_create_flow/bf_update_flow 自动追加 (2)(3) 后缀
related_bugs:
  - BUG-20260604-001
tags: [frontend, vue-flow, drag-and-drop, business-flow-editor, dnd, wkwebview, tauri, critical]
notes: |
  HTML5 DnD API 在 WKWebView 中的不可靠性是已知的 WebKit 限制。
  mouse-event 自绘拖拽是唯一可靠的跨平台方案。
  该方案在 Windows (WebView2) 和 Linux (WebKitGTK) 上同样可用，
  且性能优于 HTML5 DnD（无需浏览器进程间通信）。

  首次尝试的修复方案（均失败）:
  1. dataTransfer MIME 绕过 (application/vueflow → text/plain + JSON) — WKWebView 静默丢弃
  2. 闭包变量 _dragCtx 绕过 dataTransfer — dragstart 成功但 dragover/drop 不触发
  3. @dragover/@drop 从 wrapper div 移到 VueFlow 组件 — inheritAttrs:false 导致事件不绑定
  4. 原生 addEventListener 绑定 .vue-flow__pane — 事件绑定成功但 OS 层不传递
  5. -webkit-user-drag: none — CSS 对 OS 层拦截无效
e2e_test: passed
