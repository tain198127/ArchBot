project:
  name: ArchBot
  description: 全生命周期开发管理工具（需求→设计→代码→测试→迁移）
  target_users:
    - 开发者个人
    - 开发团队
  tech_stack:
    frontend: Vue 3 + TypeScript + PrimeVue (Unstyled) + Tailwind CSS v4
    icons: "@lucide/vue"
    backend: Tauri 2 (Rust)
    build_tool: Vite + @tailwindcss/vite
    design_system: Storybook 10 + @storybook/addon-a11y
    fonts:
      ui: Inter
      code: JetBrains Mono

window:
  style: 无边框窗口
  title_bar: 隐藏Tauri默认标题栏
  drag_area: 菜单栏兼做窗口拖拽区域

layout:
  structure: 顶部菜单栏 → 左侧文件树 | 中间多Tab编辑区 | 右侧模型区 → 底部多Tab面板
  panels:
    left:
      name: 工作区
      content: 文件树（项目目录结构）
      resizable: true
      resize_method: 拖拽调整宽度
      project_directories:
        description: 打开项目后显示的子目录，每个有独立颜色和图标
        items:
          - 数据标准
          - 元数据
          - 需求
          - 架构设计
          - 详细设计
          - 源代码-前端
          - 源代码-后端
          - 数据库
          - 测试用例
          - 业务测试
          - 压力测试
          - 混沌测试
          - 缺陷
          - 部署
          - 证据
          - 资料
          - 风险
        context_menu:
          - 新建
          - 导入
    center:
      name: 编辑区
      content: 多Tab编辑器骨架
      features:
        - 多文件Tab切换
    right:
      name: 模型区
      controls:
        - type: 下拉框
          purpose: 切换模式（问答/Plan/专家团）
        - type: 下拉框
          purpose: 选择AI模型（来自AI配置）
      modes:
        - name: 问答模式
          description: 对话界面，用户输入问题，模型返回回答
        - name: Plan模式
          description: AI生成计划步骤，用户逐步反馈确认
          feedback_types:
            - 文本回答（自由输入）
            - 单选（AI给出选项，选一个）
            - 多选（AI给出选项，选多个）
            - 是否（Yes/No确认）
        - name: 专家团模式
          description: 多Agent协作，单窗口时间线展示所有Agent消息
          mechanism: 内置不同agent配合skill，对同一问题分工处理
          conclusion: 专家团主席统一合并结论
    bottom:
      name: 底部面板
      collapsible: true
      tabs:
        - 日志
        - 终端（可执行真实shell）
        - 分析内容

menu_bar:
  position: 页面内顶部（自定义实现）
  ui_library: Element Plus
  style: 纯文字无图标
  interaction: 点击展开，悬浮切换相邻菜单
  shortcuts: 按IntelliJ IDEA习惯，自动适配平台（macOS ⌘ / Windows Ctrl）
  items:
    - name: 文件
      groups:
        - items:
            - name: 新建项目
              shortcut: Ctrl+Shift+N / ⌘+Shift+N
            - name: 打开项目
              shortcut: Ctrl+O / ⌘+O
            - name: 打开远程项目
              shortcut: null
        - items:
            - name: 保存项目
              shortcut: Ctrl+S / ⌘+S
            - name: 另存项目
              shortcut: Ctrl+Shift+S / ⌘+Shift+S
        - items:
            - name: 关闭项目
              shortcut: Ctrl+W / ⌘+W

    - name: 编辑
      groups:
        - items:
            - name: 查找
              shortcut: Ctrl+F / ⌘+F
            - name: 替换
              shortcut: Ctrl+R / ⌘+R
            - name: 定位
              shortcut: Ctrl+G / ⌘+G
        - items:
            - name: 剪切
              shortcut: Ctrl+X / ⌘+X
            - name: 复制
              shortcut: Ctrl+C / ⌘+C
        - items:
            - name: 格式化
              shortcut: Ctrl+Alt+L / ⌘+Option+L

    - name: 视图
      groups: []
      note: 后续补充

    - name: 配置
      groups:
        - items:
            - name: AI配置
              shortcut: null
            - name: skill配置
              shortcut: null
            - name: MCP
              shortcut: null
        - items:
            - name: 会话
              shortcut: null
            - name: 规则
              shortcut: null
            - name: 记忆
              shortcut: null
        - items:
            - name: 代码库
              shortcut: null
            - name: git集成
              shortcut: null
        - items:
            - name: 系统配置
              shortcut: null

    - name: 运行
      groups:
        - items:
            - name: 命令行
              shortcut: Alt+F12 / Option+F12
        - items:
            - name: 生成需规
              shortcut: null
            - name: 生成设计
              shortcut: null
            - name: 生成代码
              shortcut: null
            - name: 生成代码骨架
              shortcut: null
        - items:
            - name: 生成数据库表
              shortcut: null
            - name: 生成数据标准
              shortcut: null
            - name: 生成调用链
              shortcut: null
        - items:
            - name: 生成测试用例
              shortcut: null
            - name: 生成e2e测试脚本
              shortcut: null

    - name: 帮助
      groups: []
      note: 后续补充

theme:
  default: Light
  options:
    - Light
    - Dark
  switch_location: 系统配置页面
  current_iteration: true

settings:
  description: 系统配置页面，从配置菜单 → 系统配置打开，在编辑区以Tab形式展示
  storage: ~/.ArchBot/settings.json
  items:
    - name: 界面语言
      options: [中文, English]
      effect: 实时切换界面所有文字
    - name: 字体大小
      range: 12-24px
      effect: 实时更新全局字体大小
    - name: 字体
      options: [System Default, JetBrains Mono, Fira Code, Cascadia Code, Source Code Pro, Microsoft YaHei]
      effect: 实时更新全局字体
    - name: 主题
      options: [Light, Dark]
      effect: 实时切换CSS变量主题
    - name: AI回复语言
      options: [跟随界面语言, 中文, English]
    - name: 代理服务器
      fields: [启用开关, 协议(HTTP/HTTPS/SOCKS5), 地址, 端口]
    - name: 更新
      fields: [当前版本, 检查更新]
  actions:
    - 保存配置
    - 恢复默认（重置为初始配置）

i18n:
  resource_files:
    - src/i18n/zh-CN.ts
    - src/i18n/en-US.ts
  usage: useI18n() composable
  type_safe: true

project_file:
  extension: .ab
  format: YAML
  description: 项目文件，通过文件菜单 → 新建项目创建
  structure:
    name: 项目名称
    version: 版本号
    description: 项目描述
    created_at: 创建时间
  validation:
    - Rust serde_yml 反序列化校验 YAML 格式
    - name 和 version 字段必填
    - 文件名不含非法字符（/\:*?"<>|）
    - 创建时检查文件是否已存在

data_standard:
  description: 数据标准管理模块，作为源头驱动数据库表生成和数据校验
  storage:
    format: 细粒度拆分 YAML 文件
    structure:
      - "{project}/data-standard/{domain}/_domain.yml（域基本信息）"
      - "{project}/data-standard/{domain}/_conventions.yml（编码规范）"
      - "{project}/data-standard/{domain}/entities/{entity}.yml（每个实体一个文件）"
      - "{project}/data-standard/{domain}/enums/{enum}.yml（每个枚举一个文件）"
    meta: 每个文件头部含 _meta（version, locked_by, updated_by, checksum）用于乐观锁
  features:
    - 域管理（创建/切换数据域）
    - 实体定义（字段、索引、关联关系）
    - 枚举/码表管理
    - 编码规范配置
    - 字段校验规则
    - DDL 实时预览
    - 乐观锁版本冲突检测
  ui:
    layout: 左侧实体/枚举导航 + 右侧表格编辑器
    editing: inline 表格编辑（类似 Navicat 表设计器）
    tabs: [字段, 索引, 关联关系, 预览DDL]
  downstream:
    - 生成数据库建表 DDL
    - 生成前端/后端校验代码
    - 生成 ORM 关联和 ER 图
    - 数据脱敏规则
  collaboration:
    phase1: Git 协作（细粒度文件减少 merge 冲突）
    phase2: 后端服务 push/pull + 乐观锁 + 字段级 diff

iteration:
  current:
    name: v0.1 - UI骨架
    scope:
      - UI骨架（整体布局+菜单+各区域占位）
      - Element Plus集成
      - 无边框窗口配置
      - 可拖拽分割面板
      - 菜单栏完整交互（展开/悬浮切换/快捷键显示）
      - 多Tab骨架（编辑区+底部面板）
      - 系统配置页面（语言/字体/主题/AI语言/代理/更新）
      - 主题切换实时生效（CSS变量方案）
      - 配置持久化到 ~/.ArchBot/settings.json
      - 新建项目功能（选择路径+输入文件名→生成.ab文件）
      - 打开项目功能（选择.ab文件，校验YAML格式）
      - 打开最近项目（≥0.5s hover 显示最近5个项目及完整文件路径，localStorage 持久化）
      - 数据标准编辑器（域管理/实体/枚举/字段表格编辑/DDL预览）
      - i18n国际化（中/英）
      - 软件注册（硬件指纹+RSA验证码+license文件防篡改+受限功能置灰+debug模式绕过）
      - 文件系统抽象层（FsBackend trait + LocalFs + RemoteFs，6个操作+8个Tauri commands）
      - LanceDB 嵌入式向量数据库（Rust 原生，4 个 Tauri commands：建表/插入/搜索/列表）
      - LanceDB 数据存储于 ~/.ArchBot/lancedb/，支持 FixedSizeList 向量 + ANN 搜索
    excluded:
      - 其他菜单项实际功能逻辑
      - 各区域具体业务内容
      - AI模型实际调用
      - 软件更新功能实现
