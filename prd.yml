project:
  name: ArchBot
  description: 全生命周期开发管理工具（需求→设计→代码→测试→迁移）
  target_users:
    - 开发者个人
    - 开发团队
  tech_stack:
    frontend: Vue 3 + TypeScript + PrimeVue (Unstyled) + Tailwind CSS v4
    icons: "@lucide/vue"
    backend: Tauri 2 (Rust)
    build_tool: Vite + @tailwindcss/vite
    design_system: Storybook 10 + @storybook/addon-a11y
    e2e_testing:
      browser: Playwright (standalone Vite dev server on port 1430)
      native: tauri-plugin-playwright (custom plugin, HTTP bridge to Tauri WebView, e2e-test feature flag)
      fixtures: TauriPage + TauriLocator (async API mirroring Playwright semantics)
    fonts:
      ui: Inter
      code: JetBrains Mono

window:
  style: 无边框窗口
  title_bar: 隐藏Tauri默认标题栏
  drag_area: 菜单栏兼做窗口拖拽区域

layout:
  structure: 顶部菜单栏 → 左侧文件树 | 中间多Tab编辑区 | 右侧模型区 → 底部多Tab面板
  panels:
    left:
      name: 工作区
      content: 文件树（项目目录结构）
      resizable: true
      resize_method: 拖拽调整宽度
      project_directories:
        description: 打开项目后显示的子目录，每个有独立颜色和图标
        items:
          - 数据标准
          - 元数据
          - 需求
          - 架构设计
          - 详细设计
          - 源代码-前端
          - 源代码-后端
          - 数据库
          - 测试用例
          - 业务测试
          - 压力测试
          - 混沌测试
          - 缺陷
          - 部署
          - 证据
          - 资料
          - 风险
        context_menu:
          - 新建
          - 导入
    center:
      name: 编辑区
      content: 多Tab编辑器骨架
      features:
        - 多文件Tab切换
    right:
      name: 模型区
      controls:
        - type: 下拉框
          purpose: 切换模式（问答/Plan/专家团）
        - type: 下拉框
          purpose: 选择AI模型（来自AI配置）
      modes:
        - name: 问答模式
          description: 对话界面，用户输入问题，模型返回回答
        - name: Plan模式
          description: AI生成计划步骤，用户逐步反馈确认
          feedback_types:
            - 文本回答（自由输入）
            - 单选（AI给出选项，选一个）
            - 多选（AI给出选项，选多个）
            - 是否（Yes/No确认）
        - name: 专家团模式
          description: 多Agent协作，单窗口时间线展示所有Agent消息
          mechanism: 内置不同agent配合skill，对同一问题分工处理
          conclusion: 专家团主席统一合并结论
    bottom:
      name: 底部面板
      collapsible: true
      tabs:
        - 日志
        - 终端（可执行真实shell）
        - 分析内容
        - Agent（会话/回合/事件/差异/审计）

menu_bar:
