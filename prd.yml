  ui_library: Element Plus
  style: 纯文字无图标
  interaction: 点击展开，悬浮切换相邻菜单
  shortcuts: 按IntelliJ IDEA习惯，自动适配平台（macOS ⌘ / Windows Ctrl）
  items:
    - name: 文件
      groups:
        - items:
            - name: 新建项目
              shortcut: Ctrl+Shift+N / ⌘+Shift+N
            - name: 打开项目
              shortcut: Ctrl+O / ⌘+O
            - name: 打开远程项目
              shortcut: null
        - items:
            - name: 保存项目
              shortcut: Ctrl+S / ⌘+S
            - name: 另存项目
              shortcut: Ctrl+Shift+S / ⌘+Shift+S
        - items:
            - name: 关闭项目
              shortcut: Ctrl+W / ⌘+W

    - name: 编辑
      groups:
        - items:
            - name: 查找
              shortcut: Ctrl+F / ⌘+F
            - name: 替换
              shortcut: Ctrl+R / ⌘+R
            - name: 定位
              shortcut: Ctrl+G / ⌘+G
        - items:
            - name: 剪切
              shortcut: Ctrl+X / ⌘+X
            - name: 复制
              shortcut: Ctrl+C / ⌘+C
        - items:
            - name: 格式化
              shortcut: Ctrl+Alt+L / ⌘+Option+L

    - name: 视图
      groups: []
      note: 后续补充

    - name: 配置
      groups:
        - items:
            - name: AI配置
              shortcut: null
            - name: Agent配置
              shortcut: null
            - name: skill配置
              shortcut: null
            - name: MCP
              shortcut: null
        - items:
            - name: 会话
              shortcut: null
            - name: 规则
              shortcut: null
            - name: 记忆
              shortcut: null
        - items:
            - name: 代码库
              shortcut: null
            - name: git集成
              shortcut: null
        - items:
            - name: 系统配置
              shortcut: null

    - name: 运行
      groups:
        - items:
            - name: 命令行
              shortcut: Alt+F12 / Option+F12
        - items:
            - name: 生成需规
              shortcut: null
            - name: 生成设计
              shortcut: null
            - name: 生成代码
              shortcut: null
            - name: 生成代码骨架
              shortcut: null
        - items:
            - name: 生成数据库表
              shortcut: null
            - name: 生成数据标准
              shortcut: null
            - name: 生成调用链
              shortcut: null
        - items:
            - name: 生成测试用例
              shortcut: null
            - name: 生成e2e测试脚本
              shortcut: null

    - name: 帮助
      groups: []
      note: 后续补充

theme:
  default: Light
  options:
    - Light
    - Dark
  switch_location: 系统配置页面
  current_iteration: true

settings:
  description: 系统配置页面，从配置菜单 → 系统配置打开，在编辑区以Tab形式展示
  storage: ~/.ArchBot/settings.json
  items:
    - name: 界面语言
      options: [中文, English]
      effect: 实时切换界面所有文字
    - name: 字体大小
      range: 12-24px
      effect: 实时更新全局字体大小
    - name: 字体
      options: [System Default, JetBrains Mono, Fira Code, Cascadia Code, Source Code Pro, Microsoft YaHei]
      effect: 实时更新全局字体
    - name: 主题
      options: [Light, Dark]
      effect: 实时切换CSS变量主题
    - name: AI回复语言
      options: [跟随界面语言, 中文, English]
    - name: 代理服务器
      fields: [启用开关, 协议(HTTP/HTTPS/SOCKS5), 地址, 端口]
    - name: 更新
      fields: [当前版本, 检查更新]
  actions:
    - 保存配置
    - 恢复默认（重置为初始配置）

i18n:
  resource_files:
    - src/i18n/zh-CN.ts
    - src/i18n/en-US.ts
  usage: useI18n() composable
  type_safe: true

project_file:
  extension: .ab
  format: YAML
  description: 项目文件，通过文件菜单 → 新建项目创建
  structure:
    name: 项目名称
    version: 版本号
    description: 项目描述
    created_at: 创建时间
  validation:
    - Rust serde_yml 反序列化校验 YAML 格式
    - name 和 version 字段必填
    - 文件名不含非法字符（/\:*?"<>|）
    - 创建时检查文件是否已存在

data_standard:
  description: 数据标准管理模块，作为源头驱动数据库表生成和数据校验
  storage:
    format: 细粒度拆分 YAML 文件
    structure:
      - "{project}/data-standard/{domain}/_domain.yml（域基本信息）"
      - "{project}/data-standard/{domain}/_conventions.yml（编码规范）"
      - "{project}/data-standard/{domain}/entities/{entity}.yml（每个实体一个文件）"
      - "{project}/data-standard/{domain}/enums/{enum}.yml（每个枚举一个文件）"
    meta: 每个文件头部含 _meta（version, locked_by, updated_by, checksum）用于乐观锁
  features:
    - 域管理（创建/切换数据域）
    - 实体定义（字段、索引、关联关系）
    - 枚举/码表管理
    - 编码规范配置
    - 字段校验规则
    - DDL 实时预览
    - 乐观锁版本冲突检测
  ui:
    layout: 左侧实体/枚举导航 + 右侧表格编辑器
    editing: inline 表格编辑（类似 Navicat 表设计器）
    tabs: [字段, 索引, 关联关系, 预览DDL]
  downstream:
    - 生成数据库建表 DDL
    - 生成前端/后端校验代码
    - 生成 ORM 关联和 ER 图
    - 数据脱敏规则
  collaboration:
    phase1: Git 协作（细粒度文件减少 merge 冲突）
    phase2: 后端服务 push/pull + 乐观锁 + 字段级 diff

ai_config:
  description: AI 大模型配置面板，管理多个 AI Provider 及其 API Key
  storage: ~/.archbot/config/providers.yml（Provider 定义） + 加密密钥库（API Key）
  features:
    - 内置 9 个 Provider（Anthropic/OpenAI/DeepSeek/Groq/xAI/Google/OpenRouter/Together AI/DeepInfra）
    - 自定义 Provider 添加/编辑/删除
    - 模型列表管理（添加/删除模型，设置默认模型）
    - API Key 加密存储（AES-256-GCM，machine_id 派生密钥）
    - 连接验证（调用 Provider API 验证模型可用性）
    - 设为默认 Provider（选择优先级最高，持久化到 settings.json）
    - 只显示已验证 Provider（has_api_key=true）到 Agent 配置页面
  ui:
    layout: 左侧 Provider 列表（排序：默认优先） + 右侧详情编辑器
    provider_card: 名称 + 协议标签 + API Key 状态指示灯
    default_indicator: 琥珀色标签 "默认"
    model_list: 标签式展示，悬停显示设默认/删除按钮，默认模型高亮

agent_runtime:
  description: 外部 Agent 运行时管理（Claude Code / OpenCode / Hermes / OpenClaw）
  config_file:
    default: src-tauri/config/runtimes.default.yml（打包内置）
    user: ~/.archbot/config/runtimes.yml（首次启动从 default 复制，后续用户修改保存于此）
  architecture:
    pattern: Adapter 模式（AgentAdapter trait，每 runtime 独立实现）
    modules:
      - version_manager: 版本检测（三层：symlink → executable --version → system PATH）、安装（find_on_path + symlink）、切换、回滚、安装后自动安装 skill bundle
      - skill_installer: Skill Bundle 安装器 — git shallow clone 技能包到隔离 HOME 的 .claude/skills/，支持安装/更新/列举，失败不阻塞
      - session_manager: AgentSession + AgentTurn CRUD，SeaORM + SQLite 持久化
      - adapter_manager: 健康检查、能力查询，AgentAdapter trait 统一接口
      - event_stream: StandardEvent 事件总线，16 种事件类型，SSE 推送
      - context_assembly: 滑动窗口历史压缩、上下文装配
      - file_control: 回合前后文件快照、差异扫描、文件回滚（含路径穿越防护）
      - shell_control: 命令白名单校验、危险命令拦截（rm/sudo/ssh 等）
      - launcher: 子进程启动、隔离 Home 目录部署
    database:
      tables: 11 张（agent_runtime, agent_runtime_version, agent_adapter, agent_session, agent_turn, agent_event, agent_artifact, agent_file_change, agent_decision, agent_context_snapshot, agent_audit_log）
      orm: SeaORM + SQLite（~/.archbot/data/archbot.db）
  security:
    - runtime_name 白名单校验（6 个公共函数，防路径穿越）
    - 文件操作路径校验（validate_path_in_project）
    - 命令白名单（shell_control extract_command_name + validate）
    - provider_id 持久化（非 env var，存为 RuntimeEntry 顶层字段）

agent_config_panel:
  description: Agent 运行时配置面板，为每个 Runtime 选择 AI Provider 和模型
  ui:
    layout: 顶部 Tab 切换 Runtime + 下方 4 个配置区
    sections:
      - "安装: 状态显示 + 版本选择下拉 + Install 按钮"
      - "更新与回滚: Check Update + Rollback 按钮"
      - "AI Provider 与模型: 已验证 Provider 卡片列表，点击选中展开模型选择下拉"
      - "连接验证: Validate 按钮 + 结果显示"
    auto_save: 点击 Provider 卡片 → 自动选择默认模型 → 自动持久化到 runtimes.yml；切换模型 → 立即自动持久化
  persistence:
    mechanism: 前端 autoSaveConfig() → invoke('agent_save_config') → 写入 RuntimeEntry.provider_id + env 变量 → runtimes.yml
    restore: 页面加载 → agent_get_status → 读取 config.provider_id → 恢复选中状态

e2e_testing:
  description: 端到端测试方案
  modes:
    browser:
      config: playwright.config.ts
      target: Vite dev server (port 1430)，纯浏览器前端测试
      scope: 面板开关、分屏拖拽等不依赖 Tauri API 的 UI 交互
    native:
      config: playwright.native.config.ts
      target: Tauri 原生窗口（需 cargo tauri dev --features e2e-test 运行中）
      plugin: tauri-plugin-playwright（本地 crate，src-tauri/plugins/playwright/）
      bridge: eval-with-callback 模式（oneshot channel，window.eval() + invoke 回调）
      endpoints: 12 个 HTTP API（eval/click/fill/text/attribute/count/wait/visible/checked/hover/screenshot/info）
      fixtures:
        - TauriPage: 窗口操作、截图、等待、locator 工厂
        - TauriLocator: 点击/填充/悬停/文本/属性/可见性/断言（异步 API）
        - Claude Code 检测: globalSetup 自动检查 + 安装 @anthropic-ai/claude-code
      security: e2e-test feature flag，生产构建排除全部 plugin 代码和路由
  test_suites:
    browser:
      - e2e/toolbar-panels.spec.ts（5 个测试）
    native:
      - e2e/native/toolbar-panels.spec.ts（5 个测试）
      - e2e/native/agent-config.spec.ts（3 个测试）
      - e2e/native/ai-config.spec.ts（3 个测试）
      - e2e/native/menu-navigation.spec.ts（3 个测试）
      - e2e/native/open-recent-projects.spec.ts（6 个测试，含 localStorage 数据注入）

iteration:
  current:
    name: v0.2 - Agent 控制平面 + E2E 测试
    scope:
      - UI骨架（整体布局+菜单+各区域占位）
      - Element Plus → PrimeVue (Unstyled) + Tailwind CSS v4 迁移
      - 无边框窗口配置
      - 可拖拽分割面板
      - 菜单栏完整交互（展开/悬浮切换/快捷键显示）
      - 多Tab骨架（编辑区+底部面板）
      - 系统配置页面（语言/字体/主题/AI语言/代理/更新）
      - 主题切换实时生效（CSS变量方案）
      - 配置持久化到 ~/.ArchBot/settings.json
      - 新建项目功能（选择路径+输入文件名→生成.ab文件）
      - 打开项目功能（选择.ab文件，校验YAML格式）
      - 打开最近项目（≥0.5s hover 显示最近5个项目及完整文件路径，localStorage 持久化）
      - 数据标准编辑器（域管理/实体/枚举/字段表格编辑/DDL预览）
      - i18n国际化（中/英）
      - 软件注册（硬件指纹+RSA验证码+license文件防篡改+受限功能置灰+debug模式绕过）
      - 文件系统抽象层（FsBackend trait + LocalFs + RemoteFs，6个操作+8个Tauri commands）
      - LanceDB 嵌入式向量数据库（Rust 原生，4 个 Tauri commands：建表/插入/搜索/列表）
      - AI Provider 配置面板（9个内置Provider，API Key加密存储，连接验证，默认Provider选择）
      - Agent Runtime 管理（4个运行时：Claude Code/OpenCode/Hermes/OpenClaw）
      - Agent 配置面板（Provider选择+模型选择，自动持久化到 runtimes.yml）
      - Agent 版本管理（安装/更新/回滚，三层版本检测，安全白名单校验）
      - Agent 会话/回合管理（11张DB表，SeaORM + SQLite）
      - tauri-plugin-playwright（自定义E2E插件，HTTP→WebView桥梁，e2e-test feature flag安全隔离）
      - Playwright 自定义 Fixture（TauriPage + TauriLocator，异步API）
      - E2E 测试套件：浏览器模式5个 + 原生模式20个
      - Claude Code CLI 自动安装检测（E2E globalSetup）
    excluded:
      - 其他菜单项实际功能逻辑
      - 各区域具体业务内容
      - AI模型实际调用
      - 软件更新功能实现
