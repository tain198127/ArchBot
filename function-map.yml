      - id: act.func.review_rules_conflict
        label: "评审功能规则冲突"
        category: review
        employee: solo
        trigger: right_click
        target: "@target:view.review_report"
        input:  ["@ctx.functional_rules"]
        carry:  ["project_id", "target_doc=functional_rules", "check=conflict"]
        output: ["@ctx.review_report {checklist:[联动死循环,状态机死锁,校验规则矛盾]}"]

      - id: act.func.review_ui_compliance
        label: "评审 UI 规范合规"
        category: review
        employee: solo
        trigger: right_click
        target: "@target:view.review_report"
        input:  ["@ctx.prototype"]
