# ============================================================================
# 功能地图 (Function Map) — ArchBot 需求模块
# ============================================================================
#
# 格式说明:
#   - 节点层级: panel → group → item，以缩进表达父子关系
#   - 每个节点可挂 actions（右键菜单项），每个 action 定义 target、数据流转
#   - @xxx 为交叉引用 ID，可跨文件 grep 追溯
#   - 数据上下文 (data_contexts) 定义共享数据结构，action 通过 @ctx.xxx 引用
#   - 底部 transitions 表为全部跳转的扁平汇总，方便评审时逐条检查
#
# 阅读顺序:
#   1. 先看 tree 了解整体层级
#   2. 再看 data_contexts 了解数据结构
#   3. 展开具体 action 看 target + carry
#   4. 最后看 transitions 表做全局核对
# ============================================================================

function_map:
  meta:
    schema: "function-map-v1"
    module: "requirements"
    description: "需求模块功能地图 — 面板树 + 右键操作 + 页面跳转 + 数据流转"
    updated: "2026-05-31"

# ============================================================================
# 数据上下文 — 功能间传递的数据结构定义
# ============================================================================
data_contexts:

  ctx.project:
    description: "项目基础信息，贯穿全部上下文"
    fields:
      - { name: project_id,    type: string,  desc: "项目唯一标识" }
      - { name: project_name,  type: string,  desc: "项目名称" }
      - { name: project_path,  type: string,  desc: "项目文件路径" }
      - { name: version,       type: string,  desc: "当前版本号" }

  # ── L1 业务上下文交付物 ──
  ctx.business_objectives:
    description: "业务目标与范围文档"
    fields:
      - { name: doc_id,       type: string,  desc: "文档ID" }
      - { name: kpis,         type: list,    desc: "量化KPI列表 [{name,formula,baseline,target,deadline}]" }
      - { name: vision,       type: string,  desc: "愿景描述" }
      - { name: scope_moscow, type: map,     desc: "MoSCoW 矩阵 {must:[],should:[],could:[],wont:[]}" }
      - { name: seal_status,  type: enum,    desc: "封板状态: draft|reviewed|sealed" }

  ctx.stakeholder_register:
    description: "干系人登记册与角色权限矩阵"
    fields:
      - { name: doc_id,         type: string, desc: "文档ID" }
      - { name: stakeholders,   type: list,   desc: "[{name,role,power,interest,strategy,contact}]" }
      - { name: role_crud,      type: map,    desc: "角色×资源×操作 CRUD 矩阵" }
      - { name: data_perm,      type: map,    desc: "数据权限维度定义" }
      - { name: seal_status,    type: enum,   desc: "封板状态" }

  ctx.business_process:
    description: "业务流程图 (BPMN)"
    fields:
      - { name: doc_id,        type: string, desc: "文档ID" }
      - { name: bpmn_xml,      type: string, desc: "BPMN 2.0 XML" }
      - { name: as_is_nodes,   type: list,   desc: "AS-IS 节点 [{id,activity,role,duration,wait_time}]" }
      - { name: to_be_nodes,   type: list,   desc: "TO-BE 节点 [{id,activity,role,duration,improvement}]" }
      - { name: seal_status,   type: enum,   desc: "封板状态" }

  ctx.business_rules:
    description: "业务规则目录"
    derived_from:
      - { source: ctx.business_process, type: generates, rule: "流程决策网关(BPMN Gateway)→约束/计算/决策规则，每个 Gateway 分支条件→一条 BR" }
    fields:
      - { name: doc_id,        type: string, desc: "文档ID" }
      - { name: rules,         type: list,   desc: "[{id:BR-xxx,type:constraint|calc|decision,desc,condition,action,source,priority}]" }
      - { name: seal_status,   type: enum,   desc: "封板状态" }

  # ── L1 用户故事交付物 ──
  ctx.story_map:
    description: "用户故事地图"
    derived_from:
      - { source: ctx.business_process, type: generates, rule: "TO-BE流程节点(活动)→用户活动骨架→Story，1个流程节点→N个Story" }
      - { source: ctx.business_rules,   type: constrains, rule: "BR决策规则→Story验收标准(AC)的Given-When-Then条件" }
    fields:
      - { name: doc_id,        type: string, desc: "文档ID" }
      - { name: activities,    type: list,   desc: "用户活动骨架 [{name,steps:[]}]" }
      - { name: stories,       type: list,   desc: "[{id:US-xxx,title,as_a,want,so_that,activity,priority,story_points}]" }
      - { name: mvp_slice,     type: string, desc: "MVP 切片边界标注" }
      - { name: seal_status,   type: enum,   desc: "封板状态" }

  ctx.backlog:
    description: "迭代待办列表"
    fields:
      - { name: doc_id,        type: string, desc: "文档ID" }
      - { name: epics,         type: list,   desc: "[{id:EP-xxx,name,goal,stories:[@US-xxx]}]" }
      - { name: sprints,       type: list,   desc: "[{name,goal,stories:[@US-xxx],start_date,end_date}]" }
      - { name: seal_status,   type: enum,   desc: "封板状态" }

  # ── 字段规范 (可复用 schema，data_model.entities[].columns[] 和 data_dictionary.fields[] 共用) ──
  schemas.column_spec:
    description: "字段级完整规格 —— 所有字段定义的基准模板"
    fields:
      - { name: name_cn,         type: string,  desc: "字段中文名" }
      - { name: name_en,         type: string,  desc: "字段英文名 (snake_case)" }
      - { name: data_format,     type: enum,    desc: "数据格式: text|integer|decimal|date|datetime|time|timestamp|phone|email|password|url|uuid|json|binary|boolean" }
      - { name: precision,       type: map,     desc: "精度子字段 {date_precision:year|month|day, time_precision:hour|minute|second|millisecond, integer_digits:N, decimal_digits:N, max_length:N} —— 按 data_format 选填相关项" }
      - { name: is_unique,       type: boolean, desc: "是否唯一" }
      - { name: value_range,     type: map,     desc: "值域 {min_value, max_value, start_time, end_time, enum_ref: @codelist_code}" }
      - { name: default_value,   type: string,  desc: "默认值 (字面量或表达式如 CURRENT_TIMESTAMP)" }
      - { name: nullable,        type: boolean, desc: "是否可空" }
      - { name: is_pk,           type: boolean, desc: "是否主键" }
      - { name: is_fk,           type: boolean, desc: "是否外键" }
      - { name: fk_reference,    type: string,  desc: "外键引用 entity.column (仅 is_fk=true)" }
      - { name: encryption,      type: map,     desc: "加密策略 {transit:none|TLS|mTLS, storage:none|AES256|SM4|custom}" }
      - { name: desensitization, type: map,     desc: "脱敏策略 {enabled:bool, rule:mask_prefix|mask_suffix|mask_middle|hash|replace, pattern:'保留前3后4中间*'}" }
      - { name: charset,         type: enum,    desc: "字符集: UTF8|UTF8MB4|GBK|LATIN1|ASCII (仅文本类字段)" }
      - { name: timezone,        type: string,  desc: "时区策略: UTC|Asia/Shanghai|local|none (仅时间类字段)" }
      - { name: currency_unit,   type: enum,    desc: "货币单位: CNY|USD|EUR|JPY|none (仅金额类字段)" }
      - { name: display_widget,  type: enum,    desc: "默认控件: textbox|textarea|dropdown|datepicker|datetimepicker|switch|search_selector|list_selector|number|password|phone|email|file_upload|rich_text" }

  # ── L2 数据标准交付物 ──
  ctx.data_model:
    description: "数据模型（概念/逻辑/物理统一），每张表=一个实体，每列=一个字段规格"
    derived_from:
      - { source: ctx.business_process, type: generates, rule: "流程节点中的业务名词→候选实体，泳道角色→实体Owner" }
      - { source: ctx.business_rules,   type: constrains, rule: "BR约束规则→字段值域/唯一性/默认值" }
    fields:
      - { name: doc_id,        type: string, desc: "文档ID" }
      - { name: entities,      type: list,   desc: "[{name_cn, name_en, definition, table_name, columns:[@schemas.column_spec], indexes:[{name,columns,type:unique|normal|fulltext}], partitions:[{type,key,count}]}]" }
      - { name: relationships, type: list,   desc: "[{from_entity, from_column, to_entity, to_column, type:1:1|1:N|M:N, on_delete:RESTRICT|CASCADE|SET_NULL}]" }
      - { name: physical_ddl,  type: string, desc: "物理 DDL 脚本 (由 entities+relationships 编译生成)" }
      - { name: seal_status,   type: enum,   desc: "封板状态" }

  ctx.data_dictionary:
    description: "数据字典 —— 全系统字段级标准定义，字段定义遵循 @schemas.column_spec"
    fields:
      - { name: doc_id,        type: string, desc: "文档ID" }
      - { name: fields,        type: list,   desc: "[@schemas.column_spec + {entity_name, field_order, business_meaning, source_system}]" }
      - { name: codelists,     type: list,   desc: "码表 [{code, name, values:[{key, value, status:active|deprecated, description}]}]" }
      - { name: seal_status,   type: enum,   desc: "封板状态" }

  ctx.data_flow:
    description: "数据流向与血缘"
    fields:
      - { name: doc_id,        type: string, desc: "文档ID" }
      - { name: flows,         type: list,   desc: "[{id,from_sys,to_sys,content,protocol,freq,volume,pii}]" }
      - { name: lineages,      type: list,   desc: "[{target_field,source_sys,source_field,transform,owner}]" }
      - { name: seal_status,   type: enum,   desc: "封板状态" }

  ctx.data_classification:
    description: "数据分类分级"
    fields:
      - { name: doc_id,        type: string, desc: "文档ID" }
      - { name: classifications, type: list, desc: "[{field,cia_level,grade,compliance_tag,mask_rule,retention,owner}]" }
      - { name: seal_status,   type: enum,   desc: "封板状态" }

  # ── L3 功能定义交付物 ──
  ctx.function_tree:
    description: "系统功能树"
    derived_from:
      - { source: ctx.story_map,       type: generates,  rule: "Story→功能节点，角色权限矩阵→菜单可见性，1个Story→1个或多个按钮操作点" }
      - { source: ctx.business_process, type: references, rule: "流程泳道角色→功能节点触发角色" }
    fields:
      - { name: doc_id,        type: string, desc: "文档ID" }
      - { name: nodes,         type: list,   desc: "[{id:SYS-SUB-MOD-MENU-BTN,parent_id,name,crud,role,precondition}]" }
      - { name: seal_status,   type: enum,   desc: "封板状态" }

  ctx.prototype:
    description: "界面原型（HTML组件树）"
    derived_from:
      - { source: ctx.function_tree, type: generates, rule: "功能树菜单节点→原型页面，按钮操作点→页面内组件，1个菜单→1个页面路由" }
      - { source: ctx.story_map,     type: references, rule: "Story验收标准→页面交互规格(组件状态矩阵)" }
    fields:
      - { name: doc_id,        type: string, desc: "文档ID" }
      - { name: pages,         type: list,   desc: "[{route,title,components:[{id,type,states,props,events}]}]" }
      - { name: design_tokens, type: map,    desc: "{colors:[],fonts:[],spacing:[]}" }
      - { name: html_bundle,   type: string, desc: "可独立预览的 HTML 包路径" }
      - { name: seal_status,   type: enum,   desc: "封板状态" }

  ctx.api_contract:
    description: "接口契约 (OpenAPI)"
    derived_from:
      - { source: ctx.data_model,    type: generates,   rule: "实体→REST资源，attributes→请求/响应字段，relationships→嵌套/关联资源" }
      - { source: ctx.function_tree, type: generates,   rule: "功能节点CRUD类型→HTTP方法(GET/POST/PUT/DELETE)" }
      - { source: ctx.business_rules, type: constrains, rule: "BR约束/计算规则→API业务校验逻辑和错误码" }
    fields:
      - { name: doc_id,        type: string, desc: "文档ID" }
      - { name: openapi_spec,  type: string, desc: "OpenAPI 3.0 YAML/JSON" }
      - { name: endpoints,     type: list,   desc: "[{id,method,path,auth,ratelimit,req_schema,resp_schema,errors}]" }
      - { name: seal_status,   type: enum,   desc: "封板状态" }

  ctx.integration:
    description: "集成关系与外部接口"
    derived_from:
      - { source: ctx.data_flow,     type: refines,  rule: "数据流向图中的系统间数据传递点→集成拓扑图的边" }
      - { source: ctx.api_contract,  type: refines,  rule: "内部API→对外暴露接口需经防腐层适配(外部接口定义)" }
    fields:
      - { name: doc_id,        type: string, desc: "文档ID" }
      - { name: topology,      type: map,    desc: "系统间调用拓扑 {nodes:[],edges:[]}" }
      - { name: sequences,     type: list,   desc: "关键场景时序图 [{name,mermaid}]" }
      - { name: external_apis, type: list,   desc: "[{id,third_party,protocol,adaptor,error_handling}]" }
      - { name: seal_status,   type: enum,   desc: "封板状态" }

  ctx.functional_rules:
    description: "功能规则（联动/校验/状态机）"
    derived_from:
      - { source: ctx.business_rules, type: references, rule: "BR规则编号(BR-xxx)→FR规则中ref_br字段引用，不做重复定义" }
      - { source: ctx.prototype,      type: refines,    rule: "原型组件状态矩阵→状态机states/transitions，BR约束→UI校验规则" }
    fields:
      - { name: doc_id,        type: string, desc: "文档ID" }
      - { name: rules,         type: list,   desc: "[{id:FR-xxx,ref_br:BR-xxx,page,trigger,action,type:linkage|validation|state}]" }
      - { name: state_machines, type: list,  desc: "[{entity,states:[],transitions:[{from,to,trigger,guard}]}]" }
      - { name: seal_status,   type: enum,   desc: "封板状态" }

  # ── L4 质量属性交付物 ──
  ctx.performance:
    description: "性能需求指标"
    derived_from:
      - { source: ctx.function_tree,     type: generates,  rule: "高频功能节点→压测场景，并发用户数→TPS目标" }
      - { source: ctx.data_model,        type: constrains, rule: "实体数据量级估算→查询性能基线，大表→索引和分区策略" }
    fields:
      - { name: doc_id,        type: string, desc: "文档ID" }
      - { name: metrics,       type: list,   desc: "[{scenario,metric,p50,p95,p99,concurrency,target_date}]" }
      - { name: seal_status,   type: enum,   desc: "封板状态" }

  ctx.security:
    description: "安全需求与合规"
    derived_from:
      - { source: ctx.data_classification, type: constrains, rule: "数据分级→安全控制级别，PII字段→加密/脱敏强度要求" }
      - { source: ctx.integration,         type: constrains, rule: "外部接口→STRIDE威胁建模输入，集成链路→认证链路审查" }
    fields:
      - { name: doc_id,        type: string, desc: "文档ID" }
      - { name: stride_model,  type: map,    desc: "STRIDE 威胁模型 {spoofing:[],tampering:[],repudiation:[],disclosure:[],dos:[],elevation:[]}" }
      - { name: compliance_map, type: list,  desc: "[{regulation,clause,requirement,control,owner,deadline}]" }
      - { name: audit_log_spec, type: map,   desc: "审计日志规范" }
      - { name: seal_status,   type: enum,   desc: "封板状态" }

  ctx.availability:
    description: "可用性 SLA 与扩展方案"
    derived_from:
      - { source: ctx.business_objectives, type: constrains, rule: "业务KPI→停机成本→SLA等级(99.9/99.99/99.999)，业务重要性→子系统分级" }
      - { source: ctx.function_tree,       type: constrains, rule: "功能依赖链→可用性依赖链，关键功能→优先保障" }
    fields:
      - { name: doc_id,        type: string, desc: "文档ID" }
      - { name: sla_matrix,    type: list,   desc: "[{subsystem,sla,rto,rpo,degradation,circuit_breaker}]" }
      - { name: scale_plan,    type: map,    desc: "扩展方案 {services:[{name,current,max,trigger,cooldown}]}" }
      - { name: seal_status,   type: enum,   desc: "封板状态" }

  ctx.migration:
    description: "迁移与运维方案"
    derived_from:
      - { source: ctx.data_model, type: generates, rule: "新旧数据模型差异→迁移步骤，实体关系→数据迁移顺序(先主表后从表)" }
      - { source: ctx.availability, type: constrains, rule: "RTO/RPO→迁移窗口和回滚时间约束" }
    fields:
      - { name: doc_id,        type: string, desc: "文档ID" }
      - { name: phases,        type: list,   desc: "[{phase,timeline,action,owner,risk,rollback,verification}]" }
      - { name: deploy_topology, type: map,  desc: "部署拓扑 {nodes:[],networks:[],volumes:[]}" }
      - { name: runbooks,      type: list,   desc: "[{alert,level,trigger,channel,sla,runbook}]" }
      - { name: seal_status,   type: enum,   desc: "封板状态" }

  # ── 跨面板产物 ──
  ctx.analysis_report:
    description: "数字员工分析报告（通用）"
    fields:
      - { name: report_id,     type: string, desc: "报告ID" }
      - { name: target_doc,    type: string, desc: "被分析的交付物 @doc_id" }
      - { name: findings,      type: list,   desc: "[{severity,title,detail,suggestion}]" }
      - { name: employee,      type: string, desc: "执行的数字员工名称" }

  ctx.review_report:
    description: "数字员工评审报告（通用）"
    fields:
      - { name: report_id,     type: string, desc: "报告ID" }
      - { name: target_doc,    type: string, desc: "被评审的交付物 @doc_id" }
      - { name: checklist,     type: list,   desc: "[{item,pass,comment}]" }
      - { name: score,         type: int,    desc: "评分 0-100" }

  ctx.brainstorm_session:
    description: "头脑风暴会话"
    fields:
      - { name: session_id,    type: string, desc: "会话ID" }
      - { name: topic,         type: string, desc: "讨论主题" }
      - { name: participants,  type: list,   desc: "参与的数字员工 [{name,role}]" }
      - { name: transcript,    type: list,   desc: "[{speaker,timestamp,message,artifacts}]" }
      - { name: conclusion,    type: string, desc: "主席汇总结论" }

  ctx.srs_document:
    description: "需求规格说明书（最终产出物）"
    fields:
      - { name: doc_id,        type: string, desc: "文档ID" }
      - { name: sections,      type: list,   desc: "章节 [{title,source_docs:[@ctx.xxx]}]" }
      - { name: traceability,  type: map,    desc: "追溯矩阵" }
      - { name: format,        type: enum,   desc: "输出格式: word|pdf|markdown" }
      - { name: seal_status,   type: enum,   desc: "封板状态" }

  ctx.prototype_bundle:
    description: "原型 HTML 包（最终产出物）"
    fields:
      - { name: bundle_id,     type: string, desc: "包ID" }
      - { name: pages,         type: list,   desc: "[{route,html_file,title}]" }
      - { name: assets,        type: list,   desc: "静态资源清单" }
      - { name: index_html,    type: string, desc: "入口文件路径" }

# ============================================================================
# 外部系统 / 文件格式
# ============================================================================
external_sources:
  bpmn_file:    { desc: "BPMN 2.0 XML 文件",          ext: ".bpmn" }
  excel_file:   { desc: "Excel 工作簿",               ext: ".xlsx" }
  ddl_file:     { desc: "SQL DDL 建表语句文件",        ext: ".sql" }
  database:     { desc: "数据库连接 (JDBC URL + 凭证)", ext: null }
  java_code:    { desc: "Java Mapper/Entity 源码目录", ext: ".java" }
  openapi_file: { desc: "OpenAPI 3.0 规范文件",        ext: ".yaml/.json" }
  figma_file:   { desc: "Figma 标注链接",              ext: null }
  html_file:    { desc: "HTML 原型文件",               ext: ".html" }
  sla_template: { desc: "企业 SLA 模板文件",            ext: ".xlsx/.yaml" }
  word_file:    { desc: "Word 需求文档",               ext: ".docx" }

# ============================================================================
# 目标页面 / 编辑器
# ============================================================================
targets:
  editor.business_objectives: { desc: "业务目标与范围编辑器",     type: editor }
  editor.stakeholder:         { desc: "干系人与角色编辑器",       type: editor }
  editor.bpmn:                { desc: "BPMN 流程编辑器",         type: editor }
  editor.business_rules:      { desc: "业务规则决策表编辑器",     type: editor }
  editor.story_map:           { desc: "故事地图编辑器",           type: editor }
  editor.backlog:             { desc: "迭代待办看板",             type: editor }
  editor.data_model:          { desc: "数据模型编辑器 (ER图+DDL)", type: editor }
  editor.data_dictionary:     { desc: "数据字典编辑器",           type: editor }
  editor.data_flow:           { desc: "数据流向与血缘编辑器",     type: editor }
  editor.data_classification: { desc: "数据分级编辑器",           type: editor }
  editor.function_tree:       { desc: "系统功能树编辑器",         type: editor }
  editor.prototype:           { desc: "界面原型设计器",           type: editor }
  editor.api_contract:        { desc: "接口契约编辑器 (OpenAPI)", type: editor }
  editor.integration:         { desc: "集成关系拓扑编辑器",       type: editor }
  editor.functional_rules:    { desc: "功能规则编辑器",           type: editor }
  editor.performance:         { desc: "性能需求指标编辑器",       type: editor }
  editor.security:            { desc: "安全需求编辑器",           type: editor }
  editor.availability:        { desc: "可用性与扩展编辑器",       type: editor }
  editor.migration:           { desc: "迁移与运维方案编辑器",     type: editor }
  view.brainstorm:            { desc: "头脑风暴会话视图",         type: view }
  view.prototype_preview:     { desc: "原型 HTML 浏览器预览",     type: view }
  view.analysis_report:       { desc: "分析报告视图",             type: view }
  view.review_report:         { desc: "评审报告视图",             type: view }
  view.srs_preview:           { desc: "需求规格说明书预览",       type: view }

# ============================================================================
# 功能树 — 面板层级 + 每个节点的右键操作 + 跳转目标 + 数据流转
# ============================================================================
tree:

  # ──────────────────────────────────────────────
  # 顶层: 需求
  # ──────────────────────────────────────────────
  panel.req.root:
    label: "需求"
    label_en: "Requirements"
    type: category
    icon: folder
    children: [group.req.business, group.req.stories, group.req.data, group.req.functional, group.req.quality, group.req.evidence, group.req.materials, group.req.risk]
    actions:
      - id: act.req.brainstorm
        label: "头脑风暴"
        category: collaborate
        employee: multi
        trigger: right_click
        target: "@target:view.brainstorm"
        input:  ["@ctx.project", "@ctx.business_objectives", "@ctx.stakeholder_register"]
        carry:  ["project_id", "session_topic=需求方向探索", "context_docs=[业务目标,干系人]"]
        output: ["@ctx.brainstorm_session"]
        desc: "多数字员工围绕需求方向展开头脑风暴，主席汇总结论"

      - id: act.req.generate_srs
        label: "生成需求规格说明书"
        category: generate
        employee: solo
        trigger: right_click
        target: "@target:view.srs_preview"
        input:  ["@ctx.project", "全部已封板交付物 (5组)"]
        carry:  ["project_id", "source_docs=all_sealed"]
        output: ["@ctx.srs_document"]
        desc: "汇总全部5组交付物，编译为完整需求规格说明书"

      - id: act.req.export_html_bundle
        label: "导出原型 HTML"
        category: export
        employee: none
        trigger: right_click
        target: null  # 文件系统保存对话框
        input:  ["@ctx.prototype"]
        carry:  ["project_id", "html_bundle_path"]
        output: ["@ctx.prototype_bundle"]
        desc: "将功能定义-界面原型编译为可独立运行的 HTML 包"

      - id: act.req.seal_all
        label: "全部封板"
        category: seal
        employee: none
        trigger: right_click
        target: null  # 确认对话框
        input:  ["@ctx.project", "全部5组交付物"]
        carry:  ["project_id"]
        output: ["全部交付物 seal_status → sealed", "版本基线快照"]
        desc: "锁定全部5组需求基线，生成版本快照"

      - id: act.req.import_project
        label: "导入项目需求"
        category: import
        employee: solo
        trigger: right_click
        target: null  # 文件选择对话框
        input:  ["@external:word_file"]
        carry:  ["project_id", "parsed_sections"]
        output: ["分发到各 ctx 交付物"]
        desc: "从 Word/Markdown 整体导入，数字员工解析后分发到5组"

      - id: act.req.export_package
        label: "导出需求包"
        category: export
        employee: none
        trigger: right_click
        target: null  # 文件系统保存对话框
        input:  ["全部 ctx 交付物"]
        carry:  ["project_id"]
        output: ["需求包 (zip/tar)"]
        desc: "全部交付物及其附件打包导出"

  # ──────────────────────────────────────────────
  # 分组1: 业务上下文
  # ──────────────────────────────────────────────
  group.req.business:
    label: "业务上下文"
    label_en: "Business Context"
    type: group
    icon: briefcase
    parent: panel.req.root
    children:
      - item.req.biz.goals          # 业务目标与范围
      - item.req.biz.stakeholders   # 干系人与角色
      - item.req.biz.process        # 业务流程
      - item.req.biz.rules          # 业务规则
    actions:

      # ── 分析 ──
      - id: act.biz.analyze_goals
        label: "分析目标合理性"
        category: analyze
        employee: solo
        trigger: right_click
        target: "@target:view.analysis_report"
        input:  ["@ctx.business_objectives", "@ctx.project"]
        carry:  ["project_id", "target_doc=business_objectives", "analysis_type=feasibility"]
        output: ["@ctx.analysis_report {findings:[KPI可达性,市场对照,基线合理性]}"]

      - id: act.biz.analyze_stakeholders
        label: "分析干系人覆盖度"
        category: analyze
        employee: solo
        trigger: right_click
        target: "@target:view.analysis_report"
        input:  ["@ctx.stakeholder_register", "@ctx.project"]
        carry:  ["project_id", "target_doc=stakeholder_register", "analysis_type=coverage"]
        output: ["@ctx.analysis_report {findings:[遗漏干系人,影响力评估偏差,参与策略不当]}"]

      - id: act.biz.analyze_process_bottleneck
        label: "分析流程瓶颈"
        category: analyze
        employee: solo
        trigger: right_click
        target: "@target:view.analysis_report"
        input:  ["@ctx.business_process"]
        carry:  ["project_id", "target_doc=business_process", "analysis_type=bottleneck"]
        output: ["@ctx.analysis_report {findings:[等待节点,返工节点,耗时异常]}"]

      # ── 评审 ──
      - id: act.biz.review_rules_consistency
        label: "评审业务规则一致性"
        category: review
        employee: solo
        trigger: right_click
        target: "@target:view.review_report"
        input:  ["@ctx.business_rules"]
        carry:  ["project_id", "target_doc=business_rules", "check=consistency"]
        output: ["@ctx.review_report {checklist:[冲突检测,冗余检测,完整性]}"]

      - id: act.biz.review_scope
        label: "评审范围边界"
        category: review
        employee: solo
        trigger: right_click
        target: "@target:view.review_report"
        input:  ["@ctx.business_objectives"]
        carry:  ["project_id", "target_doc=business_objectives.scope_moscow", "check=scope"]
        output: ["@ctx.review_report {checklist:[MoSCoW合理性,边界遗漏,过度范围]}"]

      # ── 编写 ──
      - id: act.biz.write_goals
        label: "编写业务目标与范围"
        category: write
        employee: solo
        trigger: right_click
        target: "@target:editor.business_objectives"
        input:  ["@ctx.project", "@ctx.business_objectives(可空)"]
        carry:  ["project_id", "doc_id", "mode=generate"]
        output: ["@ctx.business_objectives (填充: kpis,vision,scope_moscow)"]

      - id: act.biz.write_stakeholders
        label: "编写干系人与角色"
        category: write
        employee: solo
        trigger: right_click
        target: "@target:editor.stakeholder"
        input:  ["@ctx.project", "@ctx.stakeholder_register(可空)", "@ctx.business_process(可选)"]
        carry:  ["project_id", "doc_id", "mode=generate"]
        output: ["@ctx.stakeholder_register (填充: stakeholders,role_crud,data_perm)"]

      - id: act.biz.write_process
        label: "编写业务流程"
        category: write
        employee: solo
        trigger: right_click
        target: "@target:editor.bpmn"
        input:  ["@ctx.project", "@ctx.business_process(可空)", "@ctx.business_objectives(可选)"]
        carry:  ["project_id", "doc_id", "mode=generate"]
        output: ["@ctx.business_process (填充: bpmn_xml,to_be_nodes)"]

      - id: act.biz.write_rules
        label: "编写业务规则"
        category: write
        employee: solo
        trigger: right_click
        target: "@target:editor.business_rules"
        input:  ["@ctx.project", "@ctx.business_rules(可空)", "@ctx.business_process"]
        carry:  ["project_id", "doc_id", "mode=generate", "source_process=@business_process"]
        output: ["@ctx.business_rules (填充: rules 从流程决策点提取)"]

      # ── 协作 ──
      - id: act.biz.brainstorm
        label: "头脑风暴"
        category: collaborate
        employee: multi
        trigger: right_click
        target: "@target:view.brainstorm"
        input:  ["@ctx.project", "@ctx.business_objectives", "@ctx.stakeholder_register"]
        carry:  ["project_id", "session_topic=业务方向讨论", "context_docs=[业务目标,干系人]"]
        output: ["@ctx.brainstorm_session"]
        desc: "多数字员工围绕业务目标和干系人展开讨论"

      # ── 封板 ──
      - id: act.biz.seal
        label: "封板"
        category: seal
        employee: none
        trigger: right_click
        target: null  # 确认对话框
        input:  ["@ctx.business_objectives", "@ctx.stakeholder_register", "@ctx.business_process", "@ctx.business_rules"]
        carry:  ["project_id", "group=business_context"]
        output: ["业务上下文全部4项 seal_status → sealed"]

      # ── 导入 ──
      - id: act.biz.import_bpmn
        label: "从 BPMN 导入"
        category: import
        employee: solo
        trigger: right_click
        target: "@target:editor.bpmn"
        input:  ["@external:bpmn_file"]
        carry:  ["project_id", "parsed_bpmn_xml"]
        output: ["@ctx.business_process (bpmn_xml填充)"]

      - id: act.biz.import_stakeholders
        label: "从 Excel 导入干系人"
        category: import
        employee: solo
        trigger: right_click
        target: "@target:editor.stakeholder"
        input:  ["@external:excel_file"]
        carry:  ["project_id", "parsed_rows"]
        output: ["@ctx.stakeholder_register (stakeholders填充)"]

      # ── 导出 ──
      - id: act.biz.export_doc
        label: "导出业务文档"
        category: export
        employee: none
        trigger: right_click
        target: null
        input:  ["@ctx.business_objectives", "@ctx.stakeholder_register", "@ctx.business_rules"]
        carry:  ["project_id"]
        output: ["Word/PDF 业务文档"]

      - id: act.biz.export_bpmn
        label: "导出流程图"
        category: export
        employee: none
        trigger: right_click
        target: null
        input:  ["@ctx.business_process"]
        carry:  ["project_id"]
        output: ["BPMN XML / SVG"]

  # ──────────────────────────────────────────────
  # 分组2: 用户故事
  # ──────────────────────────────────────────────
  group.req.stories:
    label: "用户故事"
    label_en: "User Stories"
    type: group
    icon: book
    parent: panel.req.root
    children:
      - item.req.stories.map       # 故事地图
      - item.req.stories.epics     # 史诗列表
      - item.req.stories.backlog   # 迭代待办
    actions:

      # ── 分析 ──
      - id: act.story.analyze_coverage
        label: "分析故事覆盖度"
        category: analyze
        employee: solo
        trigger: right_click
        target: "@target:view.analysis_report"
        input:  ["@ctx.story_map", "@ctx.business_process"]
        carry:  ["project_id", "target_doc=story_map", "ref=business_process"]
        output: ["@ctx.analysis_report {findings:[未覆盖的流程节点,过度覆盖,故事粒度不均]}"]

      - id: act.story.analyze_dependencies
        label: "分析依赖关系"
        category: analyze
        employee: solo
        trigger: right_click
        target: "@target:view.analysis_report"
        input:  ["@ctx.backlog"]
        carry:  ["project_id", "target_doc=backlog", "analysis_type=dependency"]
        output: ["@ctx.analysis_report {findings:[阻塞链,循环依赖,关键路径]}"]

      - id: act.story.analyze_priority
        label: "分析优先级合理性"
        category: analyze
        employee: solo
        trigger: right_click
        target: "@target:view.analysis_report"
        input:  ["@ctx.backlog", "@ctx.business_objectives"]
        carry:  ["project_id", "target_doc=backlog", "ref=business_objectives.kpis"]
        output: ["@ctx.analysis_report {findings:[优先级与业务目标对齐度]}"]

      # ── 评审 ──
      - id: act.story.review_invest
        label: "评审 INVEST 合规"
        category: review
        employee: solo
        trigger: right_click
        target: "@target:view.review_report"
        input:  ["@ctx.story_map"]
        carry:  ["project_id", "target_doc=story_map", "check=INVEST"]
        output: ["@ctx.review_report {checklist:[Independent,Negotiable,Valuable,Estimable,Small,Testable]}"]

      - id: act.story.review_ac
        label: "评审验收标准完整性"
        category: review
        employee: solo
        trigger: right_click
        target: "@target:view.review_report"
        input:  ["@ctx.story_map", "@ctx.business_rules"]
        carry:  ["project_id", "target_doc=story_map", "check=acceptance_criteria"]
        output: ["@ctx.review_report {checklist:[HappyPath覆盖,异常路径覆盖,边界条件]}"]

      # ── 编写 ──
      - id: act.story.write_stories
        label: "编写用户故事"
        category: write
        employee: solo
        trigger: right_click
        target: "@target:editor.story_map"
        input:  ["@ctx.project", "@ctx.business_process", "@ctx.business_rules"]
        carry:  ["project_id", "source=@business_process", "mode=generate"]
        output: ["@ctx.story_map (stories 从流程节点生成)"]

      - id: act.story.write_ac
        label: "编写验收标准"
        category: write
        employee: solo
        trigger: right_click
        target: "@target:editor.story_map"
        input:  ["@ctx.story_map", "@ctx.business_rules"]
        carry:  ["project_id", "target_story=selected", "mode=generate_ac"]
        output: ["@ctx.story_map (stories[].acceptance_criteria 填充 Given-When-Then)"]

      - id: act.story.split_epic
        label: "拆分史诗"
        category: write
        employee: solo
        trigger: right_click
        target: "@target:editor.backlog"
        input:  ["@ctx.backlog", "@ctx.story_map"]
        carry:  ["project_id", "target_epic=selected", "mode=split"]
        output: ["@ctx.backlog (epics[].stories 展开)"]

      # ── 封板 ──
      - id: act.story.seal
        label: "封板"
        category: seal
        employee: none
        trigger: right_click
        target: null
        input:  ["@ctx.story_map", "@ctx.backlog"]
        carry:  ["project_id", "group=user_stories"]
        output: ["用户故事全部3项 seal_status → sealed"]

      # ── 导入 ──
      - id: act.story.import_excel
        label: "从 Excel 导入"
        category: import
        employee: solo
        trigger: right_click
        target: "@target:editor.backlog"
        input:  ["@external:excel_file"]
        carry:  ["project_id", "parsed_rows"]
        output: ["@ctx.backlog (epics,sprints 填充)"]

      # ── 导出 ──
      - id: act.story.export_map
        label: "导出 Story Map"
        category: export
        employee: none
        trigger: right_click
        target: null
        input:  ["@ctx.story_map"]
        carry:  ["project_id"]
        output: ["图片/PDF"]

      - id: act.story.export_backlog
        label: "导出 Backlog"
        category: export
        employee: none
        trigger: right_click
        target: null
        input:  ["@ctx.backlog"]
        carry:  ["project_id"]
        output: ["Excel/CSV"]

  # ──────────────────────────────────────────────
  # 分组3: 数据标准
  # ──────────────────────────────────────────────
  group.req.data:
    label: "数据标准"
    label_en: "Data Standard"
    type: group
    icon: database
    parent: panel.req.root
    children:
      - item.req.data.model          # 数据模型
      - item.req.data.dictionary     # 数据字典
      - item.req.data.flow           # 数据流向与血缘
      - item.req.data.classification # 数据分类分级
    actions:

      # ── 分析 ──
      - id: act.data.analyze_normal_form
        label: "分析范式合规"
        category: analyze
        employee: solo
        trigger: right_click
        target: "@target:view.analysis_report"
        input:  ["@ctx.data_model"]
        carry:  ["project_id", "target_doc=data_model", "analysis_type=normal_form"]
        output: ["@ctx.analysis_report {findings:[范式违规点,反范式化建议]}"]

      - id: act.data.analyze_field_redundancy
        label: "分析字段冗余"
        category: analyze
        employee: solo
        trigger: right_click
        target: "@target:view.analysis_report"
        input:  ["@ctx.data_model", "@ctx.data_dictionary"]
        carry:  ["project_id", "target_doc=data_model+data_dictionary", "analysis_type=redundancy"]
        output: ["@ctx.analysis_report {findings:[同义不同名字段,重复存储,可合并实体]}"]

      - id: act.data.analyze_index
        label: "分析索引合理性"
        category: analyze
        employee: solo
        trigger: right_click
        target: "@target:view.analysis_report"
        input:  ["@ctx.data_model"]
        carry:  ["project_id", "target_doc=data_model.physical_ddl", "analysis_type=index"]
        output: ["@ctx.analysis_report {findings:[缺失索引,冗余索引,索引选择性评估]}"]

      # ── 评审 ──
      - id: act.data.review_naming
        label: "评审命名规范"
        category: review
        employee: solo
        trigger: right_click
        target: "@target:view.review_report"
        input:  ["@ctx.data_model", "@ctx.data_dictionary"]
        carry:  ["project_id", "target_doc=data_model+data_dictionary", "check=naming_convention"]
        output: ["@ctx.review_report {checklist:[表命名,字段命名,索引命名,约束命名]}"]

      - id: act.data.review_dictionary
        label: "评审数据字典完整性"
        category: review
        employee: solo
        trigger: right_click
        target: "@target:view.review_report"
        input:  ["@ctx.data_dictionary", "@ctx.data_model"]
        carry:  ["project_id", "target_doc=data_dictionary", "check=completeness"]
        output: ["@ctx.review_report {checklist:[未定义枚举,缺失码表,字段描述缺失]}"]

      # ── 编写 ──
      - id: act.data.write_model
        label: "从描述生成模型"
        category: write
        employee: solo
        trigger: right_click
        target: "@target:editor.data_model"
        input:  ["@ctx.project", "@ctx.business_process", "@ctx.business_rules"]
        carry:  ["project_id", "source=@business_process+@business_rules", "mode=generate"]
        output: ["@ctx.data_model (entities,relationships 从业务描述生成)"]

      - id: act.data.write_dictionary
        label: "编写数据字典"
        category: write
        employee: solo
        trigger: right_click
        target: "@target:editor.data_dictionary"
        input:  ["@ctx.project", "@ctx.data_model"]
        carry:  ["project_id", "source=@data_model", "mode=generate"]
        output: ["@ctx.data_dictionary (fields 从模型属性生成)"]

      - id: act.data.write_classification
        label: "编写数据分级"
        category: write
        employee: solo
        trigger: right_click
        target: "@target:editor.data_classification"
        input:  ["@ctx.project", "@ctx.data_dictionary"]
        carry:  ["project_id", "source=@data_dictionary", "mode=generate"]
        output: ["@ctx.data_classification (classifications 从字段类型推荐)"]

      # ── 逆向（数据标准专属）──
      - id: act.data.reverse_ddl
        label: "从 DDL 逆向"
        category: reverse
        employee: solo
        trigger: right_click
        target: "@target:editor.data_model"
        input:  ["@external:ddl_file"]
        carry:  ["project_id", "parsed_ddl", "mode=reverse"]
        output: ["@ctx.data_model (entities,relationships,physical_ddl 从DDL解析)"]

      - id: act.data.reverse_db
        label: "从数据库逆向"
        category: reverse
        employee: solo
        trigger: right_click
        target: "@target:editor.data_model"
        input:  ["@external:database"]
        carry:  ["project_id", "db_schema", "mode=reverse"]
        output: ["@ctx.data_model (完整模型从数据库反向工程)"]

      - id: act.data.reverse_code
        label: "从代码逆向"
        category: reverse
        employee: solo
        trigger: right_click
        target: "@target:editor.data_model"
        input:  ["@external:java_code"]
        carry:  ["project_id", "parsed_entities", "mode=reverse"]
        output: ["@ctx.data_model (entities,relationships 从 Mapper/Entity 提取)"]
        desc: "解析 Java Mapper (MyBatis XML / JPA Entity / MyBatis-Plus) → 提取表结构和字段映射"

      # ── 封板 ──
      - id: act.data.seal
        label: "封板"
        category: seal
        employee: none
        trigger: right_click
        target: null
        input:  ["@ctx.data_model", "@ctx.data_dictionary", "@ctx.data_flow", "@ctx.data_classification"]
        carry:  ["project_id", "group=data_standard"]
        output: ["数据标准全部4项 seal_status → sealed"]

      # ── 导入 ──
      - id: act.data.import_ddl
        label: "导入 DDL 文件"
        category: import
        employee: solo
        trigger: right_click
        target: "@target:editor.data_model"
        input:  ["@external:ddl_file"]
        carry:  ["project_id", "parsed_ddl"]
        output: ["@ctx.data_model (physical_ddl 填充)"]

      # ── 导出 ──
      - id: act.data.export_ddl
        label: "生成 DDL"
        category: export
        employee: solo
        trigger: right_click
        target: null
        input:  ["@ctx.data_model"]
        carry:  ["project_id"]
        output: ["DDL SQL 文件 (CREATE TABLE/INDEX/PARTITION)"]

      - id: act.data.export_dictionary
        label: "导出数据字典"
        category: export
        employee: none
        trigger: right_click
        target: null
        input:  ["@ctx.data_dictionary"]
        carry:  ["project_id"]
        output: ["Excel/Markdown 数据字典文档"]

      - id: act.data.export_er
        label: "导出 ER 图"
        category: export
        employee: none
        trigger: right_click
        target: null
        input:  ["@ctx.data_model"]
        carry:  ["project_id"]
        output: ["SVG/PNG ER 图"]

      - id: act.data.export_classification
        label: "导出数据分级报告"
        category: export
        employee: none
        trigger: right_click
        target: null
        input:  ["@ctx.data_classification"]
        carry:  ["project_id"]
        output: ["PDF 数据分级报告"]

  # ──────────────────────────────────────────────
  # 分组4: 功能定义
  # ──────────────────────────────────────────────
  group.req.functional:
    label: "功能定义"
    label_en: "Functional Spec"
    type: group
    icon: layout
    parent: panel.req.root
    children:
      - item.req.func.tree         # 系统功能树
      - item.req.func.prototype    # 界面原型
      - item.req.func.api          # 接口契约
      - item.req.func.integration  # 集成关系
    actions:

      # ── 分析 ──
      - id: act.func.analyze_coverage
        label: "分析功能覆盖率"
        category: analyze
        employee: solo
        trigger: right_click
        target: "@target:view.analysis_report"
        input:  ["@ctx.function_tree", "@ctx.story_map"]
        carry:  ["project_id", "target_doc=function_tree", "ref=story_map"]
        output: ["@ctx.analysis_report {findings:[未覆盖Story,无Story对应的功能,粒度偏差]}"]

      - id: act.func.analyze_api_consistency
        label: "分析接口一致性"
        category: analyze
        employee: solo
        trigger: right_click
        target: "@target:view.analysis_report"
        input:  ["@ctx.api_contract", "@ctx.data_dictionary"]
        carry:  ["project_id", "target_doc=api_contract", "ref=data_dictionary"]
        output: ["@ctx.analysis_report {findings:[字段名不一致,类型不匹配,缺失字段]}"]

      - id: act.func.analyze_coupling
        label: "分析集成耦合度"
        category: analyze
        employee: solo
        trigger: right_click
        target: "@target:view.analysis_report"
        input:  ["@ctx.integration"]
        carry:  ["project_id", "target_doc=integration", "analysis_type=coupling"]
