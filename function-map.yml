# ============================================================================
# 跳转汇总表 — 全部 action → target 扁平列表，方便逐条评审
# ============================================================================
transitions_summary:

  # 格式: { from: action_id, to: target_id, carry: [关键上下文], employee: solo|multi|none }

  # ── 顶层 ──
  - { from: act.req.brainstorm,              to: view.brainstorm,          carry: [project_id, topic, context_docs],         employee: multi }
  - { from: act.req.generate_srs,            to: view.srs_preview,        carry: [project_id, all_sealed_docs],             employee: solo }
  - { from: act.req.export_html_bundle,      to: null,                    carry: [project_id, html_bundle_path],            employee: none }
  - { from: act.req.seal_all,                to: null,                    carry: [project_id],                              employee: none }
  - { from: act.req.import_project,          to: null,                    carry: [project_id, parsed_sections],             employee: solo }
  - { from: act.req.export_package,          to: null,                    carry: [project_id],                              employee: none }

  # ── 业务上下文 ──
  - { from: act.biz.analyze_goals,           to: view.analysis_report,    carry: [target=business_objectives],              employee: solo }
  - { from: act.biz.analyze_stakeholders,    to: view.analysis_report,    carry: [target=stakeholder_register],             employee: solo }
  - { from: act.biz.analyze_process_bottleneck, to: view.analysis_report, carry: [target=business_process],                  employee: solo }
  - { from: act.biz.review_rules_consistency, to: view.review_report,     carry: [target=business_rules],                   employee: solo }
  - { from: act.biz.review_scope,            to: view.review_report,      carry: [target=scope_moscow],                     employee: solo }
  - { from: act.biz.write_goals,             to: editor.business_objectives, carry: [project_id, mode=generate],            employee: solo }
  - { from: act.biz.write_stakeholders,      to: editor.stakeholder,      carry: [project_id, mode=generate],               employee: solo }
  - { from: act.biz.write_process,           to: editor.bpmn,             carry: [project_id, mode=generate],               employee: solo }
  - { from: act.biz.write_rules,             to: editor.business_rules,   carry: [project_id, mode=generate, source_process], employee: solo }
  - { from: act.biz.brainstorm,              to: view.brainstorm,         carry: [project_id, topic=业务方向],               employee: multi }
  - { from: act.biz.seal,                    to: null,                    carry: [project_id, group=business_context],      employee: none }
  - { from: act.biz.import_bpmn,             to: editor.bpmn,             carry: [project_id, parsed_bpmn_xml],             employee: solo }
  - { from: act.biz.import_stakeholders,     to: editor.stakeholder,      carry: [project_id, parsed_rows],                 employee: solo }
  - { from: act.biz.export_doc,              to: null,                    carry: [project_id],                              employee: none }
  - { from: act.biz.export_bpmn,             to: null,                    carry: [project_id],                              employee: none }

  # ── 用户故事 ──
  - { from: act.story.analyze_coverage,      to: view.analysis_report,    carry: [target=story_map, ref=business_process],  employee: solo }
  - { from: act.story.analyze_dependencies,  to: view.analysis_report,    carry: [target=backlog],                          employee: solo }
  - { from: act.story.analyze_priority,      to: view.analysis_report,    carry: [target=backlog, ref=business_objectives], employee: solo }
  - { from: act.story.review_invest,         to: view.review_report,      carry: [target=story_map, check=INVEST],          employee: solo }
  - { from: act.story.review_ac,             to: view.review_report,      carry: [target=story_map, check=AC],              employee: solo }
  - { from: act.story.write_stories,         to: editor.story_map,        carry: [project_id, mode=generate],               employee: solo }
  - { from: act.story.write_ac,              to: editor.story_map,        carry: [project_id, target_story, mode=generate_ac], employee: solo }
  - { from: act.story.split_epic,            to: editor.backlog,          carry: [project_id, target_epic, mode=split],     employee: solo }
  - { from: act.story.seal,                  to: null,                    carry: [project_id, group=user_stories],          employee: none }
  - { from: act.story.import_excel,          to: editor.backlog,          carry: [project_id, parsed_rows],                 employee: solo }
  - { from: act.story.export_map,            to: null,                    carry: [project_id],                              employee: none }
  - { from: act.story.export_backlog,        to: null,                    carry: [project_id],                              employee: none }

  # ── 数据标准 ──
  - { from: act.data.analyze_normal_form,    to: view.analysis_report,    carry: [target=data_model],                       employee: solo }
  - { from: act.data.analyze_field_redundancy, to: view.analysis_report,  carry: [target=data_model+data_dictionary],       employee: solo }
  - { from: act.data.analyze_index,          to: view.analysis_report,    carry: [target=data_model.physical_ddl],          employee: solo }
  - { from: act.data.review_naming,          to: view.review_report,      carry: [target=data_model+data_dictionary],       employee: solo }
  - { from: act.data.review_dictionary,      to: view.review_report,      carry: [target=data_dictionary],                  employee: solo }
  - { from: act.data.write_model,            to: editor.data_model,       carry: [project_id, mode=generate],               employee: solo }
  - { from: act.data.write_dictionary,       to: editor.data_dictionary,  carry: [project_id, mode=generate],               employee: solo }
  - { from: act.data.write_classification,   to: editor.data_classification, carry: [project_id, mode=generate],            employee: solo }
  - { from: act.data.reverse_ddl,            to: editor.data_model,       carry: [project_id, parsed_ddl, mode=reverse],    employee: solo }
  - { from: act.data.reverse_db,             to: editor.data_model,       carry: [project_id, db_schema, mode=reverse],     employee: solo }
  - { from: act.data.reverse_code,           to: editor.data_model,       carry: [project_id, parsed_entities, mode=reverse], employee: solo }
  - { from: act.data.seal,                   to: null,                    carry: [project_id, group=data_standard],         employee: none }
  - { from: act.data.import_ddl,             to: editor.data_model,       carry: [project_id, parsed_ddl],                  employee: solo }
  - { from: act.data.export_ddl,             to: null,                    carry: [project_id],                              employee: solo }
  - { from: act.data.export_dictionary,      to: null,                    carry: [project_id],                              employee: none }
  - { from: act.data.export_er,              to: null,                    carry: [project_id],                              employee: none }
  - { from: act.data.export_classification,  to: null,                    carry: [project_id],                              employee: none }

  # ── 功能定义 ──
  - { from: act.func.analyze_coverage,       to: view.analysis_report,    carry: [target=function_tree, ref=story_map],     employee: solo }
  - { from: act.func.analyze_api_consistency, to: view.analysis_report,   carry: [target=api_contract, ref=data_dictionary], employee: solo }
  - { from: act.func.analyze_coupling,       to: view.analysis_report,    carry: [target=integration],                      employee: solo }
  - { from: act.func.review_api,             to: view.review_report,      carry: [target=api_contract, check=RESTful],      employee: solo }
  - { from: act.func.review_rules_conflict,  to: view.review_report,      carry: [target=functional_rules, check=conflict], employee: solo }
  - { from: act.func.review_ui_compliance,   to: view.review_report,      carry: [target=prototype, check=design_system],   employee: solo }
  - { from: act.func.write_function_tree,    to: editor.function_tree,    carry: [project_id, mode=generate],               employee: solo }
  - { from: act.func.write_api,              to: editor.api_contract,     carry: [project_id, mode=generate],               employee: solo }
  - { from: act.func.generate_prototype,     to: editor.prototype,        carry: [project_id, mode=generate_html],          employee: solo }
  - { from: act.func.write_rules,            to: editor.functional_rules, carry: [project_id, mode=generate],               employee: solo }
  - { from: act.func.preview_prototype,      to: view.prototype_preview,  carry: [project_id, html_bundle_path],            employee: none }
  - { from: act.func.seal,                   to: null,                    carry: [project_id, group=functional_spec],       employee: none }
  - { from: act.func.import_openapi,         to: editor.api_contract,     carry: [project_id, parsed_openapi_spec],         employee: solo }
  - { from: act.func.import_figma,           to: editor.prototype,        carry: [project_id, figma_link, mode=import],     employee: solo }
  - { from: act.func.import_html,            to: editor.prototype,        carry: [project_id, parsed_html, mode=import],    employee: solo }
  - { from: act.func.export_api_doc,         to: null,                    carry: [project_id],                              employee: none }
  - { from: act.func.export_prototype_html,  to: null,                    carry: [project_id],                              employee: none }
  - { from: act.func.export_function_tree,   to: null,                    carry: [project_id],                              employee: none }

  # ── 质量属性 ──
  - { from: act.qual.analyze_performance_risk, to: view.analysis_report,  carry: [target=performance],                      employee: solo }
  - { from: act.qual.analyze_threat_model,   to: view.analysis_report,    carry: [target=security, method=STRIDE],          employee: solo }
  - { from: act.qual.analyze_spof,           to: view.analysis_report,    carry: [target=availability],                     employee: solo }
  - { from: act.qual.review_sla,             to: view.review_report,      carry: [target=availability],                     employee: solo }
  - { from: act.qual.review_security,        to: view.review_report,      carry: [target=security, check=OWASP_Top10],      employee: solo }
  - { from: act.qual.review_migration,       to: view.review_report,      carry: [target=migration],                        employee: solo }
  - { from: act.qual.write_performance,      to: editor.performance,      carry: [project_id, mode=generate],               employee: solo }
  - { from: act.qual.write_security,         to: editor.security,         carry: [project_id, mode=generate],               employee: solo }
  - { from: act.qual.write_sla,              to: editor.availability,     carry: [project_id, mode=generate],               employee: solo }
  - { from: act.qual.write_migration,        to: editor.migration,        carry: [project_id, mode=generate],               employee: solo }
  - { from: act.qual.seal,                   to: null,                    carry: [project_id, group=quality_attributes],    employee: none }
  - { from: act.qual.import_sla_template,    to: editor.availability,     carry: [project_id, parsed_template],             employee: solo }
  - { from: act.qual.export_tech_spec,       to: null,                    carry: [project_id],                              employee: none }
  - { from: act.qual.export_security_checklist, to: null,                 carry: [project_id],                              employee: none }

# ============================================================================
# 依赖关系图 — 上下文之间的生成/引用/约束/细化关系
# ============================================================================
# 四种依赖类型:
#   generates   — 上游驱动下游内容生成（上游变更→下游必须重新生成）
#   references  — 下游通过ID指向上游（上游变更→下游引用可能失效）
#   constrains  — 上游限制下游的合法值域（上游变更→下游约束需重新验证）
#   refines     — 下游为上游概念增加技术细节（双向影响，不破坏上游独立性）
#
# 依赖方向: 上游(upstream) → 下游(downstream)
# 变更影响: 上行变更自动标记下游为 stale，触发分析/评审提醒
# ============================================================================
dependency_graph:

  # ── 节点清单 ──
  nodes:
    - { id: ctx.business_process,       layer: L1, group: 业务上下文, desc: "TO-BE业务流程图(BPMN)" }
    - { id: ctx.business_rules,         layer: L1, group: 业务上下文, desc: "业务规则目录(BR-xxx)" }
    - { id: ctx.business_objectives,    layer: L1, group: 业务上下文, desc: "业务目标与范围" }
    - { id: ctx.stakeholder_register,   layer: L1, group: 业务上下文, desc: "干系人与角色" }
    - { id: ctx.story_map,              layer: L1, group: 用户故事,   desc: "故事地图" }
    - { id: ctx.backlog,                layer: L1, group: 用户故事,   desc: "迭代待办" }
    - { id: ctx.data_model,             layer: L2, group: 数据标准,   desc: "数据模型(概念/逻辑/物理)" }
    - { id: ctx.data_dictionary,        layer: L2, group: 数据标准,   desc: "数据字典" }
    - { id: ctx.data_flow,              layer: L2, group: 数据标准,   desc: "数据流向与血缘" }
    - { id: ctx.data_classification,    layer: L2, group: 数据标准,   desc: "数据分类分级" }
    - { id: ctx.function_tree,          layer: L3, group: 功能定义,   desc: "系统功能树" }
    - { id: ctx.prototype,              layer: L3, group: 功能定义,   desc: "界面原型" }
    - { id: ctx.api_contract,           layer: L3, group: 功能定义,   desc: "接口契约" }
    - { id: ctx.integration,            layer: L3, group: 功能定义,   desc: "集成关系与外部接口" }
    - { id: ctx.functional_rules,       layer: L3, group: 功能定义,   desc: "功能规则(联动/校验/状态机)" }
    - { id: ctx.performance,            layer: L4, group: 质量属性,   desc: "性能需求指标" }
    - { id: ctx.security,               layer: L4, group: 质量属性,   desc: "安全需求与合规" }
    - { id: ctx.availability,           layer: L4, group: 质量属性,   desc: "可用性SLA与扩展" }
    - { id: ctx.migration,              layer: L4, group: 质量属性,   desc: "迁移与运维方案" }

  # ── 依赖边 ──
  # 格式: { upstream, downstream, type, cardinality, mapping_rule, change_impact }
  edges:

    # ═══ L1 内部依赖 ═══
    - { upstream: ctx.business_process,    downstream: ctx.business_rules,    type: generates,  cardinality: "1个Gateway → 1条或多条BR",
        mapping: "BPMN决策网关(ExclusiveGateway/InclusiveGateway)→BR规则目录，网关分支条件→规则条件子句",
        impact:   "流程变更：新增/删除决策网关→BR规则需重新生成；网关条件修改→关联BR规则标记stale" }

    - { upstream: ctx.business_process,    downstream: ctx.story_map,         type: generates,  cardinality: "1个流程活动 → N个Story",
        mapping: "BPMN泳道活动→Story Map用户活动骨架，活动→Epic，子步骤→Story",
        impact:   "流程变更：活动新增/删除/重排→Story Map需重新生成；活动角色变更→Story的as_a字段更新" }

    - { upstream: ctx.business_rules,      downstream: ctx.story_map,         type: constrains, cardinality: "1条BR → 0条或多条AC",
        mapping: "BR决策规则→Story验收标准(AC)的Given-When-Then条件子句",
        impact:   "规则变更：BR条件修改→关联AC的Given子句标记stale；BR删除→AC可能不完整" }

    - { upstream: ctx.business_objectives, downstream: ctx.backlog,           type: constrains, cardinality: "1个KPI → 多个Story优先级",
        mapping: "KPI目标值→Story优先级权重，业务范围MoSCoW→Backlog排序依据",
        impact:   "目标变更：KPI调整→Backlog优先级需重排；范围变更→Won't项可能激活" }

    - { upstream: ctx.story_map,           downstream: ctx.backlog,           type: generates,  cardinality: "1个Story → 1个Backlog条目",
        mapping: "Story Map中的Story→Backlog条目，Story优先级和SP→Sprint分配依据",
        impact:   "Story变更：新增Story→Backlog追加；Story拆分/合并→Backlog条目同步" }

    # ═══ L1 → L2 跨层依赖 ═══
    - { upstream: ctx.business_process,    downstream: ctx.data_model,        type: generates,  cardinality: "1个流程节点 → 0个或多个实体",
        mapping: "流程中的业务名词/表单字段→候选实体和属性，泳道角色→实体Owner",
        impact:   "流程变更：新增业务名词→新实体候选；表单字段变更→属性调整" }

    - { upstream: ctx.business_rules,      downstream: ctx.data_model,        type: constrains, cardinality: "1条约束规则 → 1个字段约束",
        mapping: "BR约束规则(值域/唯一性/必填)→字段value_range/is_unique/nullable，BR计算规则→字段default_value/公式",
        impact:   "规则变更：BR值域修改→字段value_range更新；BR新增必填约束→字段nullable变更(需评估数据迁移)" }

    - { upstream: ctx.data_model,          downstream: ctx.data_dictionary,   type: generates,  cardinality: "1个entity.column → 1条字典记录",
        mapping: "entity.attributes[].@schemas.column_spec→data_dictionary.fields[]，实体关系和码表→字典codelists",
        impact:   "模型变更：字段新增/删除/类型变更→字典同步；字段重命名→字典需人工确认" }

    - { upstream: ctx.integration,         downstream: ctx.data_flow,         type: refines,   cardinality: "1个集成点 → 1条数据流",
        mapping: "集成拓扑的系统间连接→数据流向图的边，接口协议/频率→数据流属性",
        impact:   "集成变更：新增系统间接口→新数据流；协议变更→数据流属性更新" }

    - { upstream: ctx.data_model,          downstream: ctx.data_flow,         type: refines,   cardinality: "1个实体 → 0条或多个血缘路径",
        mapping: "entity→数据血缘的源/目标节点，attributes→血缘字段映射",
        impact:   "模型变更：字段来源变更→血缘路径更新" }

    - { upstream: ctx.data_dictionary,     downstream: ctx.data_classification, type: generates, cardinality: "1个字段 → 1条分级记录",
        mapping: "字段类型/业务含义→敏感级别推荐，字段所属实体→数据Owner",
        impact:   "字典变更：新增PII字段→触发DPIA；字段类型变更→重新定级" }

    # ═══ L1+L2 → L3 跨层依赖 ═══
    - { upstream: ctx.story_map,           downstream: ctx.function_tree,     type: generates,  cardinality: "1个Story → 1个或多个功能节点",
        mapping: "Story标题→功能节点名称，Story对应的用户活动→菜单项，Story验收标准→按钮操作点",
        impact:   "Story变更：Story新增/删除→功能树节点同步；Story重命名→功能节点名称更新" }

    - { upstream: ctx.business_process,    downstream: ctx.function_tree,     type: references, cardinality: "1个泳道角色 → N个功能节点",
        mapping: "BPMN泳道角色→功能节点的触发角色(authorized_roles)，流程活动顺序→菜单排序",
        impact:   "流程变更：角色调整→功能节点授权更新" }

    - { upstream: ctx.function_tree,       downstream: ctx.prototype,         type: generates,  cardinality: "1个菜单→1个页面，N个按钮→N个组件",
        mapping: "功能树菜单节点→原型页面路由，按钮操作点→页面内组件，角色权限→组件可见性",
        impact:   "功能树变更：新增菜单→新原型页面；按钮增删→页面组件调整" }

    - { upstream: ctx.story_map,           downstream: ctx.prototype,         type: references, cardinality: "1条AC → 多个组件状态",
        mapping: "Story验收标准(AC)→交互规格中的组件状态矩阵(正常/异常/空/加载/边界)",
        impact:   "AC变更：AC修改→组件状态定义需更新" }

    - { upstream: ctx.data_model,          downstream: ctx.api_contract,      type: generates,  cardinality: "1个实体→1个REST资源，N个属性→N个字段",
        mapping: "entity→REST资源路径(/api/{entity})，attributes→request/response schema字段，relationships→嵌套/关联资源",
        impact:   "模型变更：实体新增/删除→API端点同步；字段类型变更→schema类型更新" }

    - { upstream: ctx.function_tree,       downstream: ctx.api_contract,      type: generates,  cardinality: "1个按钮→0个或1个API",
        mapping: "CRUD按钮(Create/Read/Update/Delete)→HTTP方法(POST/GET/PUT/DELETE)，按钮前置条件→API鉴权要求",
        impact:   "功能树变更：新按钮→可能需要新API；按钮CRUD类型变更→HTTP方法变更(不兼容变更!)" }

    - { upstream: ctx.business_rules,      downstream: ctx.api_contract,      type: constrains, cardinality: "1条BR→0条或多条API校验",
        mapping: "BR约束规则→API请求校验逻辑和400错误码，BR计算规则→API响应字段计算逻辑",
        impact:   "规则变更：BR约束变更→API校验逻辑更新；新增计算规则→响应字段可能增加" }

    - { upstream: ctx.business_rules,      downstream: ctx.functional_rules,  type: references, cardinality: "1条BR→1条或多条FR(引用关系)",
        mapping: "BR编号(BR-xxx)→FR.ref_br字段，BR决策条件→FR触发条件，BR动作→FR执行动作",
        impact:   "规则变更：BR条件修改→引用该BR的FR需重新验证；BR删除→悬空引用告警" }

    - { upstream: ctx.prototype,           downstream: ctx.functional_rules,  type: refines,    cardinality: "1个组件→1组联动/校验/状态定义",
        mapping: "原型组件状态矩阵→FR状态机states/transitions，组件联动行为→FR联动规则",
        impact:   "原型变更：组件新增状态→状态机需追加transition；组件删除→关联FR标记stale" }

    - { upstream: ctx.data_flow,           downstream: ctx.integration,       type: refines,    cardinality: "1条数据流→1个集成点",
        mapping: "数据流图(DFD)的系统间数据传递→集成拓扑的边，数据协议→集成协议",
        impact:   "数据流变更：新增系统间数据流→集成拓扑加边；协议变更→集成方式可能变化" }

    - { upstream: ctx.api_contract,        downstream: ctx.integration,       type: refines,    cardinality: "1组内部API→1个或多个外部接口",
        mapping: "内部API endpoint→需对外暴露时经防腐层适配为外部接口，鉴权方式→外部接口认证",
        impact:   "API变更：内部API不兼容变更→外部接口需同步或版本化" }

    # ═══ L1+L2+L3 → L4 跨层依赖 ═══
    - { upstream: ctx.function_tree,       downstream: ctx.performance,       type: generates,  cardinality: "1个高频功能→1个压测场景",
        mapping: "功能节点中的高频操作→性能测试场景，并发角色数→并发用户数基线",
        impact:   "功能变更：新增高频功能→新性能场景；功能流程变更→场景步骤更新" }

    - { upstream: ctx.data_model,          downstream: ctx.performance,       type: constrains, cardinality: "1张大表→1组查询性能指标",
        mapping: "entity数据量级估算(行数/存储量)→查询性能基线(P50/P95/P99)，索引设计→查询优化目标",
        impact:   "模型变更：数据量级上调→性能基线需重新评估；表结构变更→查询模式可能变化" }

    - { upstream: ctx.data_classification, downstream: ctx.security,          type: constrains, cardinality: "1个敏感字段→1组安全控制",
        mapping: "字段分级(L1-L4)→加密强度(AES256/SM4/TLS)，PII标签→脱敏规则和审计日志级别",
        impact:   "分级变更：字段升级→安全控制加强(可能影响性能)；降级需合规审批" }

    - { upstream: ctx.integration,         downstream: ctx.security,          type: constrains, cardinality: "1个外部接口→1组STRIDE威胁",
        mapping: "外部接口(第三方API/消息队列)→STRIDE威胁建模输入，集成链路→认证和加密审查路径",
        impact:   "集成变更：新外部依赖→新威胁场景；协议变更→安全控制需重新评估" }

    - { upstream: ctx.business_objectives, downstream: ctx.availability,      type: constrains, cardinality: "1个KPI→1个SLA等级",
        mapping: "业务KPI(收入/客诉)→停机成本推算→SLA等级(99.9/99.99/99.999)，业务重要性→子系统分级",
        impact:   "目标变更：KPI上调→SLA可能需升级(成本增加)；业务范围变更→子系统分级调整" }

    - { upstream: ctx.function_tree,       downstream: ctx.availability,      type: constrains, cardinality: "N个功能→1组可用性依赖链",
        mapping: "功能依赖关系→可用性依赖链(failure propagation)，关键功能→优先保障降级豁免",
        impact:   "功能变更：新增依赖→可用性依赖链延长；功能降级→故障传播路径变化" }

    - { upstream: ctx.data_model,          downstream: ctx.migration,         type: generates,  cardinality: "1个实体→1组迁移步骤",
        mapping: "新旧数据模型差异→迁移步骤(DDL变更/数据转换/校验)，实体关系→迁移顺序(先主表后从表)",
        impact:   "模型变更：新增实体→DDL迁移步骤；字段类型变更→数据转换脚本" }

    - { upstream: ctx.availability,        downstream: ctx.migration,         type: constrains, cardinality: "1个RTO→1个迁移窗口上限",
        mapping: "RTO→迁移总时长上限(数据迁移+校验+回滚演练)，RPO→增量同步间隔",
        impact:   "SLA变更：RTO缩短→迁移窗口更紧(可能需在线迁移方案)；RPO缩短→增量同步频率增加" }

# ============================================================================
# 变更影响链 — 当上游变更时，下游自动标记 stale
# ============================================================================
change_propagation:

  # 格式: { trigger: "上游节点变更", cascade: ["受影响的下游节点"], severity: critical|major|minor }

  - { trigger: "业务流程节点增删改", cascade: [ctx.business_rules, ctx.story_map, ctx.data_model, ctx.function_tree], severity: critical }
  - { trigger: "业务规则条件修改",   cascade: [ctx.story_map, ctx.data_model, ctx.api_contract, ctx.functional_rules], severity: critical }
  - { trigger: "业务目标KPI调整",    cascade: [ctx.backlog, ctx.availability], severity: major }
  - { trigger: "Story新增/拆分",     cascade: [ctx.backlog, ctx.function_tree, ctx.prototype], severity: major }
  - { trigger: "数据模型实体变更",   cascade: [ctx.data_dictionary, ctx.data_flow, ctx.api_contract, ctx.performance, ctx.migration], severity: critical }
  - { trigger: "字段类型/约束变更",  cascade: [ctx.data_dictionary, ctx.data_classification, ctx.api_contract], severity: major }
  - { trigger: "功能树节点增删",     cascade: [ctx.prototype, ctx.api_contract, ctx.performance, ctx.availability], severity: major }
  - { trigger: "API不兼容变更",      cascade: [ctx.integration], severity: critical }
  - { trigger: "数据分级上调",       cascade: [ctx.security], severity: major }
  - { trigger: "集成拓扑加边",       cascade: [ctx.data_flow, ctx.security], severity: minor }

# ============================================================================
# 追溯链 — 关键端到端数据流的叙事描述
# ============================================================================
traceability_chains:

  - name: "业务→故事→功能→原型"
    path: ctx.business_process → ctx.story_map → ctx.function_tree → ctx.prototype
    desc: "流程节点→用户活动→Story→功能节点→原型页面，L1→L3 的主价值流"

  - name: "业务→规则→模型→接口"
    path: ctx.business_process → ctx.business_rules → ctx.data_model → ctx.api_contract
    desc: "流程名词+决策规则→实体模型+约束→API契约，L1→L2→L3 的数据流"

  - name: "模型→字典→分级→安全"
    path: ctx.data_model → ctx.data_dictionary → ctx.data_classification → ctx.security
    desc: "实体属性→字段定义→分类定级→安全控制，L2→L4 的合规流"

  - name: "功能→性能+可用性"
    path: ctx.function_tree → { ctx.performance, ctx.availability }
    desc: "高频功能+关键路径→性能基线+SLA分级，L3→L4 的质量流"

  - name: "全部封板→需规说明书"
    path: all_sealed_docs → ctx.srs_document
    desc: "5组封板交付物→数字员工汇编→需求规格说明书(最终产出物)"

  - name: "原型页面→HTML打包"
    path: ctx.prototype → ctx.prototype_bundle
    desc: "功能定义-界面原型→编译打包→可独立运行HTML原型包(最终产出物)"

  - name: "逆向工程→数据模型"
    path: external(ddl|database|java_code) → ctx.data_model
    desc: "DDL文件/数据库连接/Java Mapper→数字员工解析→实体关系模型(反向工程流)"

# ============================================================================
# 系统基础设施模块 (System Infrastructure Modules)
# ============================================================================
# 以下模块为系统级功能，不属于项目级需求树，记录于此用于全局 trace。

system_modules:

  # ── AI Provider 配置 ──
  module.ai_config:
    description: "AI 大模型配置面板 — 管理 Provider 定义、API Key、连接验证"
    code:
      rust: src-tauri/src/ai_config.rs（CRUD + 验证 Tauri commands）
      vue: src/components/domain/AIConfigPanel.vue
    storage:
      - ~/.archbot/config/providers.yml（Provider 定义）
      - secret://{provider_id}/api_token（AES-256-GCM 加密密钥，machine_id 派生 key）
    features:
      - 9 个内置 Provider + 自定义添加
      - 模型管理（添加/删除/设默认）
      - 设为默认 Provider → settings.json defaultProviderId
      - 只显示已验证 Provider 到 Agent 配置页

  # ── Agent Runtime 管理 ──
  module.agent_runtime:
    description: "外部 Agent 运行时控制平面 — 版本管理 + 会话/回合 + 适配器 + 文件/Shell 安全"
    code:
      rust: src-tauri/src/agent_runtime/（17 模块）
      vue: src/components/domain/AgentConfigPanel.vue + src/components/domain/BottomPanel.vue（Agent 标签页）
      stores: src/stores/agentStore.ts（Pinia）
    database:
      orm: SeaORM + SQLite（~/.archbot/data/archbot.db）
      entities: 11 张 agent_* 表（src-tauri/src/db/entities/）
    config:
      default: src-tauri/config/runtimes.default.yml
      user: ~/.archbot/config/runtimes.yml
    key_modules:
      - turn_executor: 端到端执行引擎 — 构建 stdin prompt（内联 input.yml）→ 快照 → 启动 Runtime → 等待超时 → 事件发射 → 差异扫描 → TurnResult。支持 SecretManager + 父进程环境变量 fallback 双通道 token 注入
      - launcher: 子进程隔离启动（env_clear + 白名单注入 + stdin 管道 + 隔离 HOME）
      - version_manager: 安装/更新/回滚，三层版本检测，runtime_name 白名单校验；安装后自动触发 skill_installer
      - skill_installer: Skill Bundle 管理 — git clone 技能包到隔离 HOME 的 .claude/skills/，支持安装/更新/列举，非阻塞失败
      - session_manager: AgentSession + AgentTurn CRUD，会话/回合状态机
      - adapter_manager: AgentAdapter trait 统一接口，ClaudeCodeAdapter + 3 个 Stub
      - event_stream: StandardEvent 事件总线（16 种类型）+ SSE 推送，关联 turn_executor
      - context_assembly: 滑动窗口 + 历史压缩
      - file_control: 文件快照/差异扫描/回滚（含路径穿越防护），关联 turn_executor
      - shell_control: 命令白名单 + 危险命令拦截
    security:
      - validate_runtime_name() 白名单（6 个公共函数）
      - validate_path_in_project() 路径校验
      - extract_command_name() + validate() 命令白名单

  # ── Agent 配置面板 ──
  module.agent_config_panel:
    description: "每个 Runtime 选择 AI Provider + 模型，自动持久化到 runtimes.yml"
    code:
      vue: src/components/domain/AgentConfigPanel.vue
    data_flow:
      save: selectProvider()/selectModel() → autoSaveConfig() → invoke(agent_save_config) → RuntimeEntry.provider_id + env → runtimes.yml
      restore: onMounted → invoke(agent_get_status) → config.provider_id + model → 恢复 selectedProviderId + selectedModel
    key_behaviors:
      - 只显示 has_api_key=true 的 Provider（API Key 在 AIConfigPanel 配置）
      - 点击 Provider 卡片 → 自动选择默认模型 → 自动保存
      - 切换模型下拉 → 自动保存
      - 无手动的 Save 按钮（全自动持久化）
    skill_bundles:
      added: "2026-06-02"
      description: "Skill 合集显示 — 读取 runtimes.yml 中配置的 skill_bundle，显示安装状态"
      code:
        rust: src-tauri/src/agent_runtime/agent_config_handler.rs#agent_get_skill_bundles
        vue: src/components/domain/AgentConfigPanel.vue（Skills 标签页）
      key_behaviors:
        - 显示所有已配置的 skill bundle（含安装状态指示器）
        - 绿色圆点 = 已安装，琥珀色 = 未安装
        - 每个 bundle 独立 Install 按钮
        - 已安装的 skill 详情在下方折叠展示

  # ── Skill 配置面板 ──
  module.skill_config_panel:
    added: "2026-06-02"
    description: "Skill 的 CRUD 管理面板 — 创建/编辑/删除 Skill，支持 skill-create 自动生成内容"
    code:
      vue: src/components/domain/SkillConfigPanel.vue
    menu: config.skill（菜单已存在，面板新增）
    data_flow:
      list: onMounted → invoke(db_find_all, {table: skills}) → 表格展示
      create: 填写 code/name/command/description/body → invoke(db_insert) → 刷新列表
      update: 点击行 → 编辑字段 → invoke(db_update) → 刷新列表
      delete: 点击 Del → 确认 → invoke(db_delete) → 刷新列表
      generate: 输入 name → 点击「⚡ Generate via skill-create」→ invoke(agent_execute_turn, {prompt}) → 填充 body
    key_behaviors:
      - code 和 name 为必填项
      - command 默认为 /{code}
      - group 可选：游击队/superpowers/gstack/everything-claude-code/super-claude/claude-official-skills
      - SKILL.md body 区域为等宽字体文本框
      - Generate 按钮调用 Claude Code 的 skill-create 自动生成内容（用户输入已 XML 转义防注入）

  # ── 硅基军团面板增强 ──
  module.silicon_corps_ux:
    added: "2026-06-02"
    description: "硅基军团编辑页 UX 优化 — 炫酷性格标签 + Lucide 头像选择器 + 默认能力分组下拉"
    code:
      vue: src/components/domain/DigitalEmployeePanel.vue
    improvements:
      personality_tags:
        description: "多彩渐变标签 — 可输入自定义标签 + 14 个预设可选 + 8 色调色板"
        preset_tags: ["系统思维","逻辑严密","创造力","感性","严谨","幽默","果断","沉稳","热情","耐心","完美主义","极简主义","激进","保守"]
        colors: "8 色渐变色板，根据 tag 内容哈希分配稳定颜色"
      avatar_picker:
        description: "Lucide 图标选择器 — 20 个图标网格弹窗，点击选择"
        icons: "Bot, Code2, Brain, Sparkles, Zap, Shield, Search, Rocket, Palette, Lightbulb, Wand2, Wrench, Swords, Target, Eye, MessageCircle, Users, TestTube, Hammer, FileCode"
      default_capability:
        description: "动态分组下拉 — 已安装技能包命令 + DB 自定义技能（游击队分组）"
        data_source: "agent_list_skill_commands(runtime) + db_find_all({table: skills})"
        display_format: "中文名 (/command)"

  # ── 模型面板增强（@/# 提及 + 炼魂）──
  module.model_panel_enhancements:
    added: "2026-06-02"
    description: "右边面板输入增强 — @提及硅基军团角色、#引用项目文件、炼魂按钮蒸馏对话为 Skill"
    code:
      vue: src/components/domain/ModelPanel.vue
    features:
      at_mention:
        description: "输入 @ 触发下拉，搜索并选择硅基军团员工，插入 @员工名"
        data_source: invoke(de_list)
        interaction: "@ + 输入过滤 → 下拉选择 → 插入文本"
      hash_ref:
        description: "输入 # 触发下拉，搜索并选择项目文件，插入 #[文件路径]"
        data_source: invoke(fs_list_tree, {root, maxDepth: 3})
        interaction: "# + 输入过滤 → 下拉选择 → 插入文本"
      refine_button:
        description: "模型下拉右侧的 🔮 炼魂按钮，点击弹窗输入 Skill 名称（可选），将对话蒸馏为 SKILL.md"
        i18n_key: model.refine / model.refineTitle / model.refineDesc / model.refineNameLabel / model.refineStart
        flow: "收集对话 → 弹窗命名 → invoke(agent_execute_turn) 蒸馏 → invoke(db_insert) 保存到 skills 表 → 自动归入 guerrillas 分组"
        key_behaviors:
          - 无对话时按钮禁用
          - 留空名称时由大模型自动生成
          - 蒸馏结果自动加入游击队分组
          - 完成后在对话中显示系统消息

  # ── E2E 测试基础设施 ──
  module.e2e_testing:
    description: "端到端测试框架 — 浏览器模式 + 原生 Tauri 窗口模式"
    browser_mode:
      config: playwright.config.ts
      webServer: npx vite --port 1430
      tests: e2e/*.spec.ts
      scope: Pure frontend UI (no Tauri API)
    native_mode:
      config: playwright.native.config.ts
      prerequisite: cargo tauri dev --features e2e-test
      plugin: src-tauri/plugins/playwright/（tauri-plugin-playwright）
      bridge: eval-with-callback（oneshot channel + window.eval() + invoke 回调）
      endpoints: 12 HTTP API（/api/playwright/*）
      fixtures: e2e/fixtures/（TauriPage, TauriLocator, http-client, claude-check）
      tests: e2e/native/*.spec.ts
      security: e2e-test Cargo feature flag，生产构建排除全部 plugin 代码
    test_suites:
      - toolbar-panels（面板开关、分屏）
      - agent-config（Runtime Tab、Provider 恢复、窗口信息）
      - ai-config（Vue 挂载检查、Tauri invoke 桥、Provider 列表）
      - menu-navigation（菜单栏、文件文本、按钮交互）
      - open-recent-projects（localStorage 注入、飞出面板、空状态、清除）
