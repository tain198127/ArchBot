# ============================================================================
# 需求工程框架 (Requirements Engineering Framework)
# 基于 4A 架构：业务(Business)→ 数据(Data)→ 应用(Application)→ 技术(Technology)
# 原则: MECE (Mutually Exclusive, Collectively Exhaustive)
# ============================================================================

meta:
  framework: "4A Requirements Engineering"
  version: "1.0"
  principle: "MECE — 互斥且完备，不重不漏"
  layers: ["业务架构", "数据架构", "应用架构", "技术架构"]
  schema:
    each_section:
      - key: who           # 谁做
      - key: how           # 怎么做
      - key: rules         # 规则
      - key: presentation  # 呈现方式
      - key: audience      # 给谁看
      - key: why           # 为什么做
      - key: pre_process   # 前置流程
      - key: post_process  # 后置流程
      - key: roles         # 角色辅助
      - key: quality       # 合格标准
      - key: input         # 输入
      - key: output        # 输出

# ============================================================================
# L1: 业务架构 — Why & Who（定义"做不做""谁来做"）
# 驱动层。回答：为什么要建这个系统？边界在哪里？谁参与？
# ============================================================================
business_architecture:
  layer: 1
  name: "业务架构"
  tagline: "Why & Who"
  principle: "所有后续设计必须能追溯到本条线的业务目标或业务规则"

  # ==========================================================================
  # 1.1 业务目标与愿景
  # ==========================================================================
  business_objectives:
    order: 1
    name: "业务目标与愿景"
    summary: "量化的商业价值锚点，是整个项目的北极星"
    who:
      - role: "产品负责人 (PO)"
        responsibility: "主导访谈、提炼目标、推动干系人共识"
      - role: "业务方负责人 (Sponsor)"
        responsibility: "提供战略方向和高层目标"
    how:
      - "高管访谈：挖掘战略意图和商业动机"
      - "市场分析：竞品对标、份额测算、趋势研判"
      - "痛点梳理：现有流程的量化损失（时间/金钱/人效）"
      - "KPI 公式化：将定性目标转为可计算的数学公式"
      - "基线测量：记录当前值作为改进参照"
    rules:
      - "必须量化 —— 不可接受'提升用户体验'这类无度量目标"
      - "必须有时限 —— 例：'上线后 3 个月内，Q3 末前'"
      - "必须有基线 —— 没有对比的目标无法判定是否达成"
      - "单一目标不超过一句话，复杂目标拆解为多个子目标"
    presentation:
      format: "一页纸战略画布 + 量化 KPI 卡片组"
      template: |
        | 目标 | 测量公式 | 基线值 | 目标值 | 时限 | 负责人 |
    audience:
      - "全体干系人（对齐期望）"
      - "投资人 / 资方（投资回报依据）"
      - "开发团队全员（理解'为何而战'）"
    why: "防止方向漂移。没有量化目标，所有设计决策无锚点，功能蔓延不可控。"
    pre_process:
      - "市场调研报告 / 竞品分析"
      - "现有系统运行数据（如客诉率、工单量、耗时统计）"
      - "商业计划书 / 年度战略规划"
    post_process:
      - "目标拆解为 Epic → 分配到各迭代"
      - "建立 KPI 看板（上线后持续追踪）"
      - "非功能 KPI 下沉到 L4 技术架构的性能需求"
    roles:
      - "数据分析师：辅助 KPI 量化建模和基线数据采集"
      - "架构师：评估技术可行性，防止不可达目标"
      - "UX 研究员：补充用户体验维度的度量指标"
    quality:
      - "每个 KPI 有明确的测量公式、基线值、目标值、时限"
      - "所有核心干系人书面签字确认"
      - "KPI 数量控制在 3-7 个（聚焦核心）"
    input:
      - "商业计划书 / 产品愿景文档"
      - "市场调研 / 竞品分析报告"
      - "现有系统运行数据与客诉记录"
    output:
      - "业务目标文档（含量化 KPI 列表）"
      - "战略画布（一页纸）"
      - "干系人签字确认单"

  # ==========================================================================
  # 1.2 业务范围与边界
  # ==========================================================================
  business_scope:
    order: 2
    name: "业务范围与边界"
    summary: "明确系统 Boundary，划定 Scope——'做'与'不做'的分界线"
    who:
      - role: "产品负责人 (PO)"
        responsibility: "主导范围划定，权衡取舍"
      - role: "业务方负责人"
        responsibility: "确认业务优先级，拍板取舍争议"
      - role: "架构师"
        responsibility: "识别与外部系统的边界接口"
    how:
      - "用例穷举：列出所有可能的功能场景"
      - "MoSCoW 分级：Must / Should / Could / Won't"
      - "上下文图 (Context Diagram)：标出本系统与外部实体"
      - "编写反用例（Misuse Case）：明确不在范围内但易被误以为是的内容"
    rules:
      - "'不做'清单必须与'做'清单同等详细 —— 防止范围蔓延"
      - "跨系统功能必须明确归属方（避免两不管地带）"
      - "每个 Scope 决定必须有记录者可追溯（谁、何时、为什么）"
      - "边界变更必须走 CR（变更请求）流程，PO 审批"
    presentation:
      format: "上下文图 + MoSCoW 矩阵 + 范围边界表"
      template: |
        | 功能 | 优先级 | 归属系统 | 备注 |
        | 用户注册 | Must | 本系统 | - |
        | 单点登录 | Could | SSO 网关 | 非本系统范围 |
        | 人脸识别登录 | Won't | - | v2 评估 |
    audience:
      - "开发团队（明确要做什么、不做什么）"
      - "测试团队（测试边界判断依据）"
      - "外部系统对接方（接口责任分界线）"
      - "项目管理（WBS 拆解依据）"
    why: "防止范围蔓延（Scope Creep）。70% 的项目超期源于边界不清导致的无序追加。"
    pre_process:
      - "业务目标与愿景（1.1 输出）"
      - "现有系统清单与接口文档"
      - "组织架构图（判断跨部门边界）"
    post_process:
      - "范围边界作为 WBS（工作分解结构）输入"
      - "MoSCoW 的 Must 项进入功能树（L3.1）"
      - "'不做'清单进入风险登记册（以备后续评审）"
    roles:
      - "项目经理：确保边界在计划中可执行"
      - "法务/合规：识别监管强制的范围外内容"
      - "运维团队：确认运维边界（谁负责维护哪部分）"
    quality:
      - "'不做'清单至少有 5 项明确记录（拒绝过的需求）"
      - "上下文图中每个外部实体都有责任人和接口文档链接"
      - "所有 MoSCoW 分级经 PO 签字确认"
    input:
      - "业务目标与愿景（1.1 输出）"
      - "组织架构与现有系统清单"
      - "立项申请书 / 项目章程"
    output:
      - "系统上下文图（Context Diagram）"
      - "MoSCoW 优先级矩阵"
      - "范围边界文档（含'不做'清单）"

  # ==========================================================================
  # 1.3 干系人分析
  # ==========================================================================
  stakeholder_analysis:
    order: 3
    name: "干系人分析"
    summary: "识别所有利益相关方，分析影响力和参与策略"
    who:
      - role: "产品负责人 (PO)"
        responsibility: "主导干系人识别与访谈"
      - role: "项目经理 (PM)"
        responsibility: "编制沟通计划，执行参与策略"
    how:
      - "头脑风暴识别所有可能受影响的群体/个人"
      - "影响力-兴趣矩阵 (Power-Interest Grid) 分类"
      - "逐一访谈或问卷（高影响力干系人必访谈）"
      - "制定参与策略：告知/咨询/参与/共同决策"
    rules:
      - "遗漏关键干系人是最高风险 —— 必须交叉验证（至少 2 个独立来源）"
      - "高权力+高兴趣干系人必须深度参与（不可仅告知）"
      - "干系人登记册是活文档，发现新干系人即时更新"
    presentation:
      format: "影响力-兴趣矩阵图 + 干系人登记册（RACI 雏形）"
      template: |
        | 干系人 | 角色 | 影响力(H/M/L) | 兴趣度(H/M/L) | 参与策略 | 沟通频率 | 负责人 |
    audience:
      - "项目经理（沟通计划基准）"
      - "产品负责人（识别决策者）"
      - "团队全员（了解谁会影响项目）"
    why: "未被识别的干系人是需求变更和项目失败的首要原因。提前识别 = 提前消解阻力。"
    pre_process:
      - "业务目标与愿景（1.1）—— 了解项目背景"
      - "组织架构图"
      - "历史项目复盘报告（识别曾被遗漏的干系人类别）"
    post_process:
      - "沟通计划编制（基于参与策略）"
      - "干系人映射到角色权限矩阵（L1.4）"
      - "高风险干系人列入风险管理计划"
    roles:
      - "业务方负责人：帮助识别隐藏干系人"
      - "UX 研究员：补充终端用户视角"
      - "法务：识别监管/合规类干系人"
    quality:
      - "登记册覆盖所有组织内外部干系人（至少 8 个条目）"
      - "高影响力干系人至少完成一轮面对面访谈"
      - "无未分类干系人（每个条目有影响力+兴趣度标注）"
    input:
      - "组织架构图"
      - "业务目标与愿景（1.1 输出）"
      - "项目章程"
    output:
      - "干系人登记册"
      - "影响力-兴趣矩阵图"
      - "沟通参与计划"

  # ==========================================================================
  # 1.4 角色与权限矩阵
  # ==========================================================================
  role_permission_matrix:
    order: 4
    name: "角色与权限矩阵"
    summary: "定义系统内所有角色及其功能权限和数据权限的完整映射"
    who:
      - role: "产品负责人 (PO)"
        responsibility: "定义角色和权限策略"
      - role: "业务方负责人"
        responsibility: "确认权限边界（尤其是敏感数据和敏感操作）"
      - role: "安全架构师"
        responsibility: "审查权限最小化原则是否落实"
    how:
      - "从干系人分析（1.3）提取角色候选列表"
      - "从业务流程（1.5）提取每个步骤需要的权限"
      - "构建 CRUD 矩阵：角色 × 资源 × 操作（Create/Read/Update/Delete）"
      - "定义数据权限维度：组织范围、字段级别、记录级别"
      - "标注权限继承关系和冲突解决规则"
    rules:
      - "最小权限原则（Least Privilege）：默认无权限，显式授权"
      - "职责分离（SoD）：审批人与申请人不可是同一角色"
      - "权限变更必须走审批流，关键角色需双人授权"
      - "超级管理员角色必须有操作审计日志"
    presentation:
      format: "CRUD 矩阵表 + 角色层次图 + 数据权限维度表"
      template: |
        | 角色 | 订单.查看 | 订单.创建 | 订单.审批 | 订单.删除 | 数据范围 |
        | 销售员 | 仅自己 | 是 | 否 | 否 | 本部门 |
        | 销售经理 | 全部门 | 是 | ≤¥10万 | 否 | 本部门+下级 |
        | 财务 | 全部 | 否 | ≤¥50万 | 否 | 全公司 |
    audience:
      - "开发团队（权限编码依据）"
      - "测试团队（权限测试用例）"
      - "安全审计（合规审查）"
      - "运维团队（账号开通/回收流程）"
    why: "权限模糊是数据泄露的首要原因。清晰矩阵 = 安全基线 + 开发无歧义。"
    pre_process:
      - "干系人分析（1.3 输出）"
      - "业务流程（1.5 TO-BE 泳道图）"
      - "数据分类分级（2.7 输出）"
    post_process:
      - "开发进行 RBAC/ABAC 设计"
      - "测试编写权限测试用例矩阵"
      - "运维建立账号生命周期管理流程"
    roles:
      - "安全架构师：审查权限设计，防止越权漏洞"
      - "法务/合规：确认数据权限符合 GDPR/PIPL 等法规"
      - "DBA：数据权限映射到数据库角色/行级安全策略"
    quality:
      - "每个功能页面都能追溯到至少一个授权角色"
      - "无角色拥有超出其职责范围的权限"
      - "关键敏感操作（删除/导出/审批）有明确授权链"
    input:
      - "干系人登记册（1.3 输出）"
      - "TO-BE 业务流程图（1.5 输出）"
      - "数据分类分级文档（2.7 输出）"
    output:
      - "角色-权限 CRUD 矩阵"
      - "角色层次关系图"
      - "数据权限维度定义表"

  # ==========================================================================
  # 1.5 业务流程
  # ==========================================================================
  business_process:
    order: 5
    name: "业务流程"
    summary: "AS-IS（现状）→ TO-BE（目标）的端到端业务活动建模"
    who:
      - role: "业务分析师 (BA)"
        responsibility: "主导流程调研、绘制泳道图、组织workshop"
      - role: "业务方 Subject Matter Expert (SME)"
        responsibility: "提供流程细节、验证流程准确性"
      - role: "产品负责人 (PO)"
        responsibility: "确认 TO-BE 流程的优先级和改进目标"
    how:
      - "现场观察 + 文档分析：还原 AS-IS 流程"
      - "Workshop：业务人员共同绘制 TO-BE 流程图（棕榈纸+便利贴）"
      - "BPMN 2.0 建模：泳道、活动、网关、事件、消息流"
      - "识别瓶颈：标注每个步骤的平均耗时、等待时间、返工率"
      - "量化改进：TO-BE 流程的预期耗时/成本 vs AS-IS"
    rules:
      - "泳道必须对应真实组织角色（不可用'系统'代替决策者）"
      - "异常路径（Happy Path 之外的）必须显式建模"
      - "每个流程节点必须有输入/输出工件"
      - "TO-BE 流程需标注与 AS-IS 的差异点和改进理由"
    presentation:
      format: "BPMN 2.0 泳道图 + 流程节点说明表 + AS-IS vs TO-BE 对比"
      template: |
        | 节点ID | 活动 | 执行角色 | 输入 | 输出 | AS-IS耗时 | TO-BE耗时 | 改进点 |
    audience:
      - "开发团队（功能实现的业务流程依据）"
      - "测试团队（端到端场景测试用例来源）"
      - "业务方（流程变革共识）"
      - "培训团队（用户培训手册依据）"
    why: "流程是功能的骨架。跳过流程直接画原型 = 头痛医头，上线后流程断裂。"
    pre_process:
      - "干系人分析（1.3 输出）"
      - "业务范围与边界（1.2 输出）"
      - "现有 SOP / 操作手册 / 工单数据"
    post_process:
      - "每个流程活动映射到系统功能树（L3.1）中的菜单/按钮"
      - "流程中的决策点映射为业务规则（L1.6）"
      - "流程输入/输出数据映射到数据字典（L2.4）"
    roles:
      - "SME（领域专家）：保证流程真实准确"
      - "UX 设计师：将高频流程节点转为关键用户旅程"
      - "数据分析师：辅助流程量化（耗时/频次/返工率）"
    quality:
      - "每个泳道图覆盖至少 Happy Path + 3 条异常路径"
      - "所有泳道角色都能在 L1.4 角色权限矩阵中找到"
      - "TO-BE 流程的量化改进目标与 L1.1 业务 KPI 对齐"
    input:
      - "现有 SOP / 操作手册"
      - "干系人访谈记录"
      - "业务范围文档（1.2 输出）"
    output:
      - "AS-IS 业务流程图（BPMN）"
      - "TO-BE 业务流程图（BPMN）"
      - "流程节点说明表（含量化数据）"

  # ==========================================================================
  # 1.6 业务规则
  # ==========================================================================
  business_rules:
    order: 6
    name: "业务规则"
    summary: "定义'什么能做/不能做'的系统级约束——约束规则、计算规则、决策规则"
    who:
      - role: "业务分析师 (BA)"
        responsibility: "从流程和访谈中抽取出规则"
      - role: "业务方 SME"
        responsibility: "确认规则的准确性和例外情况"
      - role: "产品负责人 (PO)"
        responsibility: "对规则冲突做最终裁决"
    how:
      - "从业务流程（1.5）每个决策网关提取决策规则"
      - "从角色权限（1.4）提取权限约束规则"
      - "从业务方访谈提取计算规则（公式/费率/折扣/积分）"
      - "规则分类：约束规则 / 计算规则 / 触发规则 / 推导规则"
      - "用决策表（Decision Table）或 DMN 形式化表达复杂规则组合"
    rules:
      - "业务规则是单一事实源（SSoT）——L3 应用层只引用，不重复定义"
      - "每条规则必须有唯一编号（BR-001, BR-002...），可追溯"
      - "规则冲突时 PO 裁决，结果记录在规则日志中"
      - "法规类规则必须标注来源（法律条文编号/合规标准）"
    presentation:
      format: "决策表 + 规则目录（编号索引）+ 规则依赖图"
      template: |
        | 规则编号 | 规则类型 | 描述 | 条件 | 动作/结果 | 来源 | 优先级 |
        | BR-001 | 约束 | 单笔订单>¥5万需二级审批 | 金额>50000 | 触发审批流 | 财务制度 | P0 |
        | BR-015 | 计算 | VIP折扣=基础折扣+5% | 会员等级=VIP | 折扣率+5% | 营销政策 | P1 |
    audience:
      - "开发团队（编码业务逻辑的唯一依据）"
      - "测试团队（规则测试用例来源）"
      - "业务运营（日常操作合规边界）"
      - "合规/审计（查验规则是否符法规）"
    why: "业务规则散落在代码和口头中 = 隐性知识。显式化后所有人都遵守同一套规则。"
    pre_process:
      - "业务流程 TO-BE 泳道图（1.5 输出）"
      - "角色权限矩阵（1.4 输出）"
      - "法规合规清单（如有行业监管）"
    post_process:
      - "每条规则映射到 L3.4 功能规则中的引用点"
      - "规则引擎选型（复杂规则是否用 Drools/DMN 引擎）"
      - "规则变更管理流程建立"
    roles:
      - "合规/法务：审查法规类规则的准确性"
      - "架构师：评估规则引擎选型"
      - "测试架构师：设计规则的覆盖矩阵"
    quality:
      - "每条规则都是原子化的（一句话说清，不可再拆）"
      - "规则之间无冲突（经决策表交叉验证）"
      - "所有 P0 规则有 SME 签字确认"
    input:
      - "TO-BE 业务流程图（1.5 输出）"
      - "法规与合规要求清单"
      - "现有业务制度文档"
    output:
      - "业务规则目录（含唯一编号）"
      - "核心规则决策表"
      - "规则依赖关系图"

  # ==========================================================================
  # 1.7 用户故事
  # ==========================================================================
  user_stories:
    order: 7
    name: "用户故事"
    summary: "Epic → Feature → Story 层级分解，从用户视角描述功能需求"
    who:
      - role: "产品负责人 (PO)"
        responsibility: "编写 Epic 和 Feature，排定优先级"
      - role: "业务分析师 (BA)"
        responsibility: "细化 Story，编写验收标准"
      - role: "开发团队代表"
        responsibility: "参与 Story 估算和可行性评审"
    how:
      - "Epic 从业务目标（1.1）和范围（1.2）拆解而来"
      - "Feature 按业务流程（1.5）的端到端场景分组"
      - "Story 使用标准模板：As a <role>, I want <action>, so that <value>"
      - "每个 Story 附带验收标准（Acceptance Criteria），用 Given-When-Then 格式"
      - "Story Mapping：按用户旅程排列 Story，划分 MVP 迭代切片"
      - "估算：用 Story Point / T-shirt Size，团队共同估算"
    rules:
      - "每个 Story 必须能在一个迭代内完成（INVEST 原则）"
      - "Story 必须从用户视角描述，不可用技术语言（'增加数据库字段'）"
      - "PO 是优先级的唯一裁决者"
      - "没有验收标准的 Story 不可进入开发迭代"
    presentation:
      format: "Story Map 看板 + 用户故事卡片 + 优先级排序 Backlog"
      template: |
        | ID | Epic | Feature | Story | As a... | I want... | So that... | AC | SP | 优先级 |
    audience:
      - "开发团队（迭代排期依据）"
      - "测试团队（验收测试依据）"
      - "PO（优先级排序和发布规划）"
      - "项目经理（进度跟踪）"
    why: "用户故事将业务目标翻译为开发可执行的最小单元，是业务→技术的翻译层。"
    pre_process:
      - "业务目标与愿景（1.1 输出）"
      - "业务流程 TO-BE（1.5 输出）"
      - "角色权限矩阵（1.4 输出）"
      - "业务范围 MoSCoW（1.2 输出）"
    post_process:
      - "Story 拆分为 L3.1 功能树的叶节点（按钮/操作点）"
      - "Story 的验收标准升级为 L3 层级的验收用例"
      - "Story 进入迭代 Backlog，Sprint 计划时分配"
    roles:
      - "Scrum Master / 敏捷教练：主持估算和 Story Mapping 工作坊"
      - "UX 设计师：为高优先级 Story 准备交互原型"
      - "测试工程师：参与 AC 编写，确保可测试性"
    quality:
      - "每个 Story 满足 INVEST（Independent, Negotiable, Valuable, Estimable, Small, Testable）"
      - "每个 Story 有 3-5 条 Given-When-Then 验收标准"
      - "Story Map 清晰展示 MVP 切片（第 1 个发布的最小集合）"
    input:
      - "业务目标与愿景（1.1 输出）"
      - "TO-BE 业务流程图（1.5 输出）"
      - "角色权限矩阵（1.4 输出）"
      - "MoSCoW 优先级矩阵（1.2 输出）"
    output:
      - "Story Map"
      - "产品 Backlog（含优先级和估算）"
      - "用户故事卡片（含验收标准）"

# ============================================================================
# L2: 数据架构 — What（信息世界）
# 定义层。回答：系统管理什么数据？数据之间什么关系？数据从哪里来到哪里去？
# ============================================================================
data_architecture:
  layer: 2
  name: "数据架构"
  tagline: "What — 信息世界"
  principle: "数据模型驱动功能设计，而非功能反过来定义数据结构"

  # ==========================================================================
  # 2.1 概念数据模型
  # ==========================================================================
  conceptual_data_model:
    order: 1
    name: "概念数据模型"
    summary: "实体关系的高层抽象，纯业务视角，不涉及任何技术实现细节"
    who:
      - role: "数据架构师 / 业务分析师"
        responsibility: "主导实体识别和关系建模"
      - role: "业务方 SME"
        responsibility: "确认实体定义和业务含义"
    how:
      - "从业务流程（1.5）和用户故事（1.7）中提取名词 → 候选实体"
      - "标注实体间关系：1:1 / 1:N / M:N"
      - "仅保留业务核心属性（3-5 个关键属性/实体），不展开全部字段"
      - "用 ER 图或 UML 类图表达，工具：Draw.io / PlantUML / Mermaid"
    rules:
      - "实体名称使用业务术语（不可用表名前缀如 tbl_xxx）"
      - "每个实体必须能用一句业务语言定义清楚"
      - "M:N 关系必须标注中间关联实体"
      - "不涉及主键策略、索引、分区等技术细节"
    presentation:
      format: "ER 图 + 实体说明表（每实体一段业务定义）"
      template: |
        | 实体 | 业务定义 | 核心属性 | 关联实体 |
        | 客户 | 与我司有交易关系的组织或个人 | 名称、类型、状态 | 订单(1:N)、合同(1:N) |
    audience:
      - "业务方 SME（验证模型是否反映真实业务）"
      - "数据架构师 / DBA（概念→逻辑的过渡输入）"
      - "开发团队（理解业务领域模型）"
    why: "概念模型是业务与技术之间的通用语言。跳过它直接建表 = 数据结构偏离业务语义。"
    pre_process:
      - "业务流程 TO-BE（1.5 输出）"
      - "用户故事（1.7 输出）"
      - "干系人分析（1.3 输出）"
    post_process:
      - "概念实体展开为逻辑数据模型（2.2）"
      - "实体属性详细化为数据字典（2.4）"
      - "实体作为 API 设计（L3.3）的资源建模基础"
    roles:
      - "业务方 SME：验证实体定义和关系准确性"
      - "UX 研究员：补充用户心智模型中的概念对象"
      - "架构师：识别聚合根和领域边界（DDD 视角）"
    quality:
      - "实体数量适中（10-30 个核心实体），不过度抽象也不过度细化"
      - "所有 M:N 关系和关联实体已显式建模"
      - "业务方 SME 确认模型反映真实业务，无遗漏关键实体"
    input:
      - "TO-BE 业务流程图（1.5 输出）"
      - "用户故事（1.7 输出）"
      - "业务方访谈记录"
    output:
      - "概念 ER 图"
      - "实体说明表"

  # ==========================================================================
  # 2.2 逻辑数据模型
  # ==========================================================================
  logical_data_model:
    order: 2
    name: "逻辑数据模型"
    summary: "完整属性、主键、外键、关系、范式化，平台无关但已接近实现"
    who:
      - role: "数据架构师"
        responsibility: "主导逻辑建模、范式化设计"
      - role: "业务分析师 (BA)"
        responsibility: "确认属性定义和业务规则映射"
    how:
      - "概念实体展开全部属性（数据类型、长度、是否必填）"
      - "定义主键策略（业务主键 vs 代理主键）和外键关系"
      - "范式化：3NF（第三范式），明确反范式化的业务理由"
      - "标注属性的业务约束：唯一性、取值范围、默认值"
      - "梳理继承关系、多态关联等复杂建模场景"
    rules:
      - "默认 3NF，反范式化必须有性能或查询便利性的业务理由"
      - "每个属性必须有业务含义，禁止出现 flag1/flag2/text1/text2 等无意义命名"
      - "外键关系必须标注级联策略（CASCADE / SET NULL / RESTRICT）"
      - "枚举属性必须指向 L2.4 数据字典中的码表定义"
    presentation:
      format: "完整 ER 图 + 实体属性清单表 + 关系清单表"
      template: |
        | 实体 | 属性 | 类型 | 必填 | 默认值 | 约束 | 备注 |
        | 订单 | order_id | UUID | 是 | gen_random_uuid() | PK | - |
        | 订单 | amount | DECIMAL(18,2) | 是 | - | >0 | 单位:元 |
    audience:
      - "DBA（逻辑→物理的输入）"
      - "后端开发（ORM 实体设计依据）"
      - "测试团队（数据完整性测试用例）"
    why: "逻辑模型是把业务概念翻译成结构化数据的核心一步，决定了数据质量和扩展性。"
    pre_process:
      - "概念数据模型（2.1 输出）"
      - "业务规则目录（1.6 输出）—— 映射为属性约束"
      - "数据字典初稿（2.4）—— 码表引用"
    post_process:
      - "逻辑模型转换为物理模型（2.3）—— 加上 DB 特定优化"
      - "实体属性展开为数据字典完整条目（2.4）"
      - "模型评审：数据架构师 + DBA + 后端 Lead"
    roles:
      - "DBA：评审主键策略和索引设计可行性"
      - "后端 Lead：确认 ORM 框架对模型的支持"
      - "安全架构师：审查敏感字段的分类标签"
    quality:
      - "3NF 达成（除有明确记录的反范式化豁免）"
      - "所有属性有业务含义，无占位符命名"
      - "所有外键的级联策略已明确标注"
    input:
      - "概念 ER 图（2.1 输出）"
      - "业务规则目录（1.6 输出）"
      - "数据字典码表定义（2.4）"
    output:
      - "逻辑 ER 图（全属性）"
      - "实体属性清单表"
      - "关系与外键清单（含级联策略）"

  # ==========================================================================
  # 2.3 物理数据模型
  # ==========================================================================
  physical_data_model:
    order: 3
    name: "物理数据模型"
    summary: "绑定具体数据库的实现模型：表空间、索引策略、分区、分片、存储参数"
    who:
      - role: "DBA"
        responsibility: "主导物理设计，优化存储和查询性能"
      - role: "数据架构师"
        responsibility: "审核物理模型是否忠实映射逻辑模型"
    how:
      - "逻辑实体映射到物理表（表名、列名遵循命名规范）"
      - "设计索引策略：聚簇索引、覆盖索引、全文索引"
      - "分区设计：按时间/按范围/按哈希"
      - "设定存储引擎参数（InnoDB/PostgreSQL 表空间）"
      - "估算数据增长：3 年内的行数和存储量级"
      - "生成 DDL 脚本（CREATE TABLE / INDEX / PARTITION）"
    rules:
      - "物理表名/列名遵循统一命名规范（如 snake_case）"
      - "索引不是越多越好 —— 每个索引必须有查询模式的依据"
      - "DDL 必须可重复执行（含 IF NOT EXISTS / DROP IF EXISTS）"
      - "敏感字段标注加密策略（列级加密/静态加密）"
    presentation:
      format: "物理 ER 图 + DDL 脚本 + 索引设计说明 + 数据增长估算表"
      template: |
        | 表名 | 预估行数(3年) | 存储量(3年) | 分区策略 | 核心索引 |
    audience:
      - "DBA（执行和运维）"
      - "后端开发（ORM 映射、查询优化）"
      - "运维/SRE（容量规划、备份策略）"
    why: "物理模型决定了系统的数据性能天花板。逻辑模型再好，物理实现错误直接导致性能灾难。"
    pre_process:
      - "逻辑数据模型（2.2 输出）"
      - "性能需求（4.1）—— TPS/QPS 指标驱动索引设计"
      - "可用性需求（4.3）—— RTO 驱动备份/复制策略"
    post_process:
      - "DDL 脚本在测试环境执行验证"
      - "索引性能压测（用预估生产量级数据）"
      - "生成数据库基线版本脚本（纳入版本控制）"
    roles:
      - "后端 Lead：确认查询模式以优化索引"
      - "SRE：确认存储容量和备份窗口"
      - "安全架构师：审查加密和脱敏策略"
    quality:
      - "DDL 脚本在测试环境可无错误执行"
      - "每个索引有对应的查询 SQL 作为依据"
      - "数据增长估算附计算过程，非拍脑袋"
    input:
      - "逻辑数据模型（2.2 输出）"
      - "性能需求文档（4.1 输出）"
      - "DB 选型文档（MySQL/PostgreSQL/Oracle 等）"
    output:
      - "物理 ER 图"
      - "完整 DDL 脚本（含索引、分区、约束）"
      - "索引设计说明文档"
      - "数据增长估算表"

  # ==========================================================================
  # 2.4 数据字典
  # ==========================================================================
  data_dictionary:
    order: 4
    name: "数据字典"
    summary: "字段级的标准定义——类型、长度、取值范围、编码标准、业务含义"
    who:
      - role: "数据治理专员 / 数据架构师"
        responsibility: "定义和维护数据标准"
      - role: "业务分析师 (BA)"
        responsibility: "确认字段的业务含义和取值范围"
      - role: "业务方 SME"
        responsibility: "确认编码标准和业务术语"
    how:
      - "从逻辑模型（2.2）提取全部字段，展开为字典条目"
      - "定义每个字段的数据类型、长度/精度、是否可空、默认值"
      - "定义编码标准：枚举码表、参考数据、格式正则"
      - "标注字段的敏感级别和脱敏规则（引用 2.7 数据分级）"
      - "建立字段的血缘追踪基线（来源系统 → 当前字段 → 下游消费）"
    rules:
      - "一个字段一个定义，全系统唯一（同名必定同义）"
      - "枚举字段必须关联码表，码表必须维护完整生命周期"
      - "金额字段统一精度（如 DECIMAL(18,2)）、时间统一时区策略"
    presentation:
      format: "数据字典表 + 码表附录"
      template: |
        | 字段ID | 所属实体 | 字段名 | 类型 | 长度 | 必填 | 默认值 | 码表 | 敏感级别 | 业务含义 |
    audience:
      - "开发团队（编码时查阅字段定义，避免重复造轮子）"
      - "测试团队（字段级校验规则来源）"
      - "数据治理委员会（数据标准化基线）"
      - "BI/数据分析团队（数据消费的字典参考）"
    why: "数据字典是团队的'数据宪法'。没有它，同一个'状态'字段在 5 个地方有 5 种取值范围。"
    pre_process:
      - "逻辑数据模型（2.2 输出）"
      - "概念数据模型（2.1 输出）—— 实体业务定义"
      - "数据分类分级（2.7 输出）—— 敏感级别"
    post_process:
      - "字典评审（数据治理委员会签字）"
      - "字典发布到团队 Wiki / 内部数据门户"
      - "字典纳入 CI 校验（代码中的字段定义与字典一致性检查）"
    roles:
      - "数据治理委员会：审批字典标准"
      - "BI 分析师：确认下游消费需求"
      - "安全架构师：确认脱敏规则"
    quality:
      - "同名字段全系统只有一种定义（已做去重检查）"
      - "所有枚举字段有关联码表"
      - "字典经数据治理委员会评审通过"
    input:
      - "逻辑数据模型（2.2 输出）"
      - "业务规则目录（1.6 输出）"
      - "现有系统代码中的字段定义"
    output:
      - "数据字典完整文档"
      - "码表定义清单"
      - "字段命名规范文档"

  # ==========================================================================
  # 2.5 数据流向图
  # ==========================================================================
  data_flow_diagram:
    order: 5
    name: "数据流向图"
    summary: "系统间的数据传递方向、协议、频率和格式"
    who:
      - role: "数据架构师 / 集成架构师"
        responsibility: "主导绘制数据流和接口矩阵"
      - role: "业务分析师 (BA)"
        responsibility: "确认业务场景的数据交换需求"
    how:
      - "识别系统间所有数据传递点（接口、消息、文件、ETL）"
      - "用 DFD（数据流图）或集成架构图表达"
      - "标注每个数据流的：方向、协议、频率（实时/批量）、数据量级"
      - "标注数据格式（JSON/XML/CSV/Protobuf）和版本"
      - "标注错误处理和重试机制"
    rules:
      - "每个数据流必须有源系统责任人和目标系统责任人"
      - "PII（个人敏感信息）的数据流必须特殊标注"
      - "实时流和批量流必须区分标注（延迟要求不同）"
    presentation:
      format: "DFD 数据流图 + 系统接口矩阵表"
      template: |
        | 流ID | 源系统 | 目标系统 | 数据内容 | 协议 | 频率 | 量级 | PII | 责任人 |
    audience:
      - "集成开发团队（接口实现依据）"
      - "安全架构师（数据泄露风险评估）"
      - "运维/SRE（监控和告警配置）"
      - "合规（跨境数据传输审查）"
    why: "数据流图暴露隐式依赖——你以为是独立系统，实际 3 个上游数据源你都不知道。"
    pre_process:
      - "系统上下文图（1.2 输出）"
      - "集成关系拓扑（L3.5）"
      - "数据分类分级（2.7 输出）"
    post_process:
      - "每条数据流映射到接口契约（L3.3）"
      - "数据流中的 PII 触发 DPIA（隐私影响评估）"
      - "关键数据流配置监控告警"
    roles:
      - "集成开发 Lead：确认技术可行性"
      - "安全架构师：数据流中的 PII 标注和防护"
      - "合规官：跨境数据流合规审查"
    quality:
      - "所有系统间数据传递点均被识别（无遗漏接口）"
      - "PII 数据流已特殊标注并附防护措施"
      - "各系统责任人已确认数据流责任"
    input:
      - "系统上下文图（1.2 输出）"
      - "现有系统接口清单"
      - "数据分类分级（2.7 输出）"
    output:
      - "数据流图 (DFD)"
      - "系统接口矩阵表"

  # ==========================================================================
  # 2.6 数据血缘
  # ==========================================================================
  data_lineage:
    order: 6
    name: "数据血缘"
    summary: "字段级的端到端溯源——数据从哪来、经过哪些转换、最终被谁消费"
    who:
      - role: "数据架构师 / 数据治理专员"
        responsibility: "主导血缘采集和建模"
      - role: "ETL 开发工程师"
        responsibility: "提供转换逻辑细节"
    how:
      - "从数据源（数据库表/API/文件）开始逐字段追踪"
      - "记录每个 ETL/ELT 转换步骤的逻辑和责任人"
      - "标注血缘类型：直接复制 / 公式计算 / 聚合 / 码表映射"
      - "用工具（如 OpenLineage / DataHub / 手动血缘矩阵）记录"
      - "标注关键字段的数据质量规则（非空率、唯一率、值域合规率）"
    rules:
      - "影响分析和变更管理：修改源字段时，必须通知所有下游消费者"
      - "每个血缘节点有责任人，确保断链时可追溯"
      - "关键报表字段（监管/财务/KPI）血缘必查，容错率为零"
    presentation:
      format: "字段血缘图（节点-边有向图）+ 字段血缘矩阵表"
      template: |
        | 目标字段 | 源系统 | 源表.源字段 | 转换逻辑 | 转换责任人 | 下游消费者 |
    audience:
      - "数据治理委员会（合规和质量基线）"
      - "BI/报表团队（排查数据不准时快速定位根因）"
      - "后端开发（变更影响分析）"
      - "合规/审计（监管报表溯源要求）"
    why: "报表数据出错时，没有血缘就只能从源头人肉排查。血缘 = 数据世界的 Git Blame。"
    pre_process:
      - "数据流向图（2.5 输出）"
      - "逻辑数据模型（2.2 输出）"
      - "ETL 任务清单和转换逻辑文档"
    post_process:
      - "血缘数据录入数据目录（Data Catalog）"
      - "配置血缘变更通知（源变更 → 下游告警）"
      - "血缘纳入数据质量监控平台"
    roles:
      - "ETL 开发：提供准确转换逻辑"
      - "BI 分析师：确认下游消费字段清单"
      - "合规官：审计关键报表血缘完整性"
    quality:
      - "关键字段（财务/监管/KPI）的血缘覆盖率 100%"
      - "每个血缘节点有责任人和转换逻辑说明"
      - "血缘数据每季度/每次重大变更后更新"
    input:
      - "数据流向图（2.5 输出）"
      - "ETL/ELT 任务清单"
      - "下游报表/API 消费清单"
    output:
      - "字段血缘图"
      - "字段血缘矩阵表"
      - "变更影响分析流程文档"

  # ==========================================================================
  # 2.7 数据分类分级
  # ==========================================================================
  data_classification:
    order: 7
    name: "数据分类分级"
    summary: "按安全等级、合规要求和业务敏感度对数据资产分级，配套脱敏和保留策略"
    who:
      - role: "安全架构师 / DPO (数据保护官)"
        responsibility: "主导分类分级标准和策略制定"
      - role: "业务方负责人"
        responsibility: "确认数据的业务敏感度级别"
      - role: "法务/合规"
        responsibility: "确认法规要求（GDPR / PIPL / PCI-DSS 等）"
    how:
      - "从数据字典（2.4）提取所有字段，逐字段定级"
      - "分级维度：机密性（C）/ 完整性（I）/ 可用性（A）各分高/中/低"
      - "标注法规影响：是否含 PII？是否受跨境限制？是否需审计留存？"
      - "配套定义：脱敏规则（掩码/哈希/加密）、保留策略（到期删除/归档）"
      - "标注数据所有者（Data Owner）和数据管家（Data Steward）"
    rules:
      - "三级分类基准：公开 / 内部 / 机密 / 绝密（或 L1-L4），全公司统一"
      - "PII 数据默认不低于'机密'级别"
      - "每种级别的数据有对应的存储加密和传输加密要求"
    presentation:
      format: "数据分级矩阵 + 脱敏规则表 + 保留策略表"
      template: |
        | 字段 | CIA级别 | 数据分级 | 法规标签 | 脱敏规则 | 保留期 | 数据Owner |
    audience:
      - "安全架构师（防护策略依据）"
      - "开发团队（脱敏实现和访问控制）"
      - "合规/审计（检查分级是否满足法规）"
      - "DBA（备份加密和归档策略）"
    why: "不是所有数据都同等重要。分级决定了安全投入的优先级——把钱花在刀刃上。"
    pre_process:
      - "数据字典（2.4 输出）"
      - "法规与合规要求清单"
      - "数据流向图（2.5 输出）—— PII 流特殊标注"
    post_process:
      - "分级结果映射到 L1.4 角色权限矩阵的数据权限维度"
      - "脱敏规则映射到 L3.3 接口契约的响应字段标注"
      - "安全架构师评审分级合理性"
    roles:
      - "DPO / 法务：确认法规合规性"
      - "安全架构师：审查技术防护措施是否匹配分级"
      - "业务方：确认分级不影响业务可用性"
    quality:
      - "所有含 PII 的字段均被识别和分级"
      - "每层级的数据有唯一的脱敏和保留策略"
      - "数据 Owner 和 Steward 已明确指派"
    input:
      - "数据字典（2.4 输出）"
      - "法规与合规要求清单"
      - "企业数据治理政策"
    output:
      - "数据分级矩阵"
      - "脱敏规则表"
      - "数据保留与归档策略"

# ============================================================================
# L3: 应用架构 — How（功能与交互）
# 实现层。回答：系统提供哪些功能？界面长什么样？接口如何定义？
# ============================================================================
application_architecture:
  layer: 3
  name: "应用架构"
  tagline: "How — 功能与交互"
  principle: "功能来源于业务规则引用，接口来源于数据模型映射，界面来源于用户旅程"

  # ==========================================================================
  # 3.1 系统功能树
  # ==========================================================================
  system_function_tree:
    order: 1
    name: "系统功能树"
    summary: "系统→子系统→模块→菜单→按钮操作点，完整的功能层级分解"
    who:
      - role: "产品负责人 (PO)"
        responsibility: "定义功能范围和层级结构"
      - role: "业务分析师 (BA)"
        responsibility: "细化每个功能点到可操作粒度"
    how:
      - "从 MoSCoW 的 Must 项（1.2）和 Story Map（1.7）提取功能点"
      - "按系统→子系统→模块→菜单→按钮操作点 5 级组织"
      - "每个叶节点（按钮/操作点）关联：触发角色、前置条件、后置结果"
      - "标注功能之间的依赖关系和调用顺序"
      - "用思维导图或树形表格呈现，每个节点有唯一编号"
    rules:
      - "功能编号体系：SYS-SUB-MOD-MENU-BTN，如 ORD-CRM-CUS-001-ADD"
      - "每个叶节点必须映射到至少一个用户故事（1.7）或业务规则（1.6）"
      - "功能节点的 CRUD 类型必须标注（C/R/U/D）"
      - "菜单顺序遵循用户任务频率（高频在前）"
    presentation:
      format: "功能树状图 + 功能清单表（含编号体系）"
      template: |
        | 编号 | 层级 | 名称 | CRUD | 触发角色 | 前置条件 | 关联 Story/BR |
        | ORD-01-01-001-ADD | 按钮 | 新建订单 | C | 销售员 | 客户已选择 | US-042 |
    audience:
      - "开发团队（模块划分和编码任务分配依据）"
      - "测试团队（功能测试用例树）"
      - "项目经理（WBS 和进度跟踪）"
      - "UX 设计师（导航结构设计依据）"
    why: "功能树是开发的'施工图纸'——每个叶节点对应一个可估算、可分配、可测试的开发任务。"
    pre_process:
      - "MoSCoW 优先级矩阵（1.2 输出）"
      - "Story Map & Backlog（1.7 输出）"
      - "业务流程 TO-BE（1.5 输出）"
    post_process:
      - "每个叶节点映射到前端路由/组件和后端 API"
      - "功能树作为项目 WBS 的输入"
      - "测试团队基于功能树编写功能测试用例矩阵"
    roles:
      - "UX 设计师：将功能树中的菜单节点映射到导航和信息架构"
      - "架构师：审核功能依赖关系，防止循环依赖"
      - "测试 Lead：评估每个叶节点的测试复杂度"
    quality:
      - "最少展开到 4 级（菜单），核心流程展开到 5 级（按钮）"
      - "每个叶节点有唯一编号，编号体系可支持未来扩展"
      - "所有 L1 业务需求（Must）都在功能树中有对应节点"
    input:
      - "MoSCoW 优先级矩阵（1.2 输出）"
      - "Story Map（1.7 输出）"
      - "TO-BE 业务流程图（1.5 输出）"
    output:
      - "系统功能树状图"
      - "功能清单表（含编号、CRUD、角色映射）"
      - "功能依赖关系图"

  # ==========================================================================
  # 3.2 原型 & UI规格
  # ==========================================================================
  prototype_ui_spec:
    order: 2
    name: "原型 & UI规格"
    summary: "页面布局、组件交互、响应式行为、无障碍标准的完整规格"
    who:
      - role: "UX 设计师"
        responsibility: "主导原型设计和交互规格编写"
      - role: "产品负责人 (PO)"
        responsibility: "确认交互逻辑符合业务目标"
      - role: "前端开发 Lead"
        responsibility: "评审技术可行性和组件复用性"
    how:
      - "低保真线框图（Wireframe）：快速验证布局和信息架构"
      - "高保真原型（Hi-Fi Mockup）：像素级界面规格，含颜色/字体/间距"
      - "交互规格：定义每个组件的状态（默认/悬停/点击/禁用/加载/错误/空）"
      - "响应式断点：Mobile (<768) / Tablet (768-1024) / Desktop (>1024)"
      - "无障碍 (A11y)：ARIA 标签、键盘导航、色彩对比度、屏幕阅读器适配"
      - "用工具：Figma / Sketch / Axure，交付标注版（含间距、颜色 Token）"
    rules:
      - "所有用户可见文本必须经过 i18n Key 标注（对齐国际化方案）"
      - "每个交互状态必须有视觉定义 —— 不可只画 Happy Path"
      - "组件的错误/空/加载状态必须与正常态同等优先"
      - "颜色对比度满足 WCAG 2.1 AA 标准（正常文本 4.5:1，大文本 3:1）"
    presentation:
      format: "Figma 标注版 + 交互规格说明文档 + 组件状态矩阵"
      template: |
        | 页面 | 组件 | 状态 | 视觉表现 | 触发条件 | 用户可操作 | 备注 |
        | 订单列表 | 表格 | 加载中 | skeleton+spinner | 接口未返回 | 无 | - |
        | 订单列表 | 表格 | 空数据 | 空状态插画+'创建第一单'按钮 | 查询无结果 | 点击按钮 | - |
    audience:
      - "前端开发（像素级实现依据）"
      - "测试团队（UI 自动化测试用例）"
      - "PO / 业务方（验收界面是否符合预期）"
      - "UX 文案（确认界面文案）"
    why: "原型是唯一不需要'翻译'的需求制品——'我看到了'就是'我理解了'。远胜千字描述。"
    pre_process:
      - "系统功能树（3.1 输出）—— 确定页面和菜单结构"
      - "用户故事（1.7 输出）—— 用户旅程和场景"
      - "设计系统 / 组件库（如有）"
    post_process:
      - "前端开发基于原型切图/编码"
      - "视觉回归测试（Visual Regression Test）基线建立"
      - "可用性测试（Usability Testing）"
    roles:
      - "UX 文案：校对界面所有文本"
      - "前端 Lead：确认原型中的组件在设计系统中已有或需新建"
      - "A11y 专家：审计无障碍合规"
    quality:
      - "每个页面覆盖所有状态（默认/悬停/点击/禁用/加载/错误/空）"
      - "WCAG 2.1 AA 基准达成"
      - "PO 和业务方签字确认"
    input:
      - "系统功能树（3.1 输出）"
      - "用户故事 & Story Map（1.7 输出）"
      - "设计系统 / 品牌 VI 规范"
    output:
      - "低保真线框图"
      - "高保真原型（Figma 标注版）"
      - "交互规格文档（含组件状态矩阵）"
      - "设计 Token 清单（颜色/字体/间距）"

  # ==========================================================================
  # 3.3 接口契约
  # ==========================================================================
  api_contract:
    order: 3
    name: "接口契约"
    summary: "API 的完整定义——入参/出参/错误码/鉴权方式/速率限制/版本策略"
    who:
      - role: "后端开发 / API 架构师"
        responsibility: "定义接口契约，编写 OpenAPI 文档"
      - role: "前端开发"
        responsibility: "评审接口是否满足前端消费需求"
      - role: "测试工程师"
        responsibility: "基于契约编写接口测试"
    how:
      - "用 OpenAPI 3.0 / Swagger 编写 API Spec"
      - "定义每个 endpoint：method、path、headers、query params、request body、response body"
      - "逐字段标注：类型、必填、约束（长度/范围/正则）、示例值"
      - "定义错误码体系（业务错误码 + HTTP 状态码 + 错误消息）"
      - "标注鉴权方式（JWT / OAuth2 / API Key）和速率限制"
      - "API 版本策略：URL Path versioning / Header versioning"
    rules:
      - "API 契约是前后端的合同——谁先开发不重要，契约必须先定"
      - "出参字段必须对 L2.4 数据字典中的字段（或标注为展示衍生字段）"
      - "所有 PII 字段在响应中标注脱敏方式（引用 2.7 分级）"
      - "接口变更必须走版本化：不兼容变更→新版本，兼容变更→原版本扩展"
      - "使用统一的 API 响应信封（code / message / data / trace_id）"
    presentation:
      format: "OpenAPI 3.0 文档（Swagger UI 可渲染）+ 接口清单表"
      template: |
        | 接口ID | 方法 | Path | 鉴权 | 限流 | 请求体 | 响应体 | 错误码 |
    audience:
      - "前端开发（调用接口的权威参考）"
      - "后端开发（实现目标）"
      - "测试团队（接口自动化测试依据）"
      - "外部集成方（第三方集成时查阅）"
    why: "契约优先（Contract-First）= 前后端并行开发不互相阻塞。契约是唯一可被机器验证的需求制品。"
    pre_process:
      - "系统功能树（3.1 输出）—— 确定需要的 API 集合"
      - "数据字典（2.4 输出）—— 出参字段定义基准"
      - "数据流向图（2.5 输出）—— 系统间接口"
    post_process:
      - "基于契约生成 Mock Server（前端并行开发）"
      - "基于契约自动生成接口测试用例骨架"
      - "契约纳入 CI：变更时自动 diff 并通知前后端"
    roles:
      - "前端 Lead：确认接口粒度（不过粗/不过细）"
      - "安全架构师：审查鉴权和限流策略"
      - "测试架构师：确认契约可测试性"
    quality:
      - "所有 endpoint 有完整的 request/response schema（非 any 类型）"
      - "所有状态码场景（2xx/4xx/5xx）有对应的 response schema"
      - "PII 字段已标注脱敏方式"
    input:
      - "系统功能树（3.1 输出）"
      - "数据字典（2.4 输出）"
      - "数据流向图 / 集成矩阵（2.5 输出）"
    output:
      - "OpenAPI 3.0 规范文件"
      - "接口契约文档（Swagger UI）"
      - "错误码清单"
      - "鉴权方案文档"

  # ==========================================================================
  # 3.4 功能规则
  # ==========================================================================
  functional_rules:
    order: 4
    name: "功能规则"
    summary: "页面/组件的联动规则、校验规则、状态机——引用 L1.6 业务规则并技术化"
    who:
      - role: "业务分析师 (BA)"
        responsibility: "将 L1.6 业务规则翻译为功能场景规则"
      - role: "UX 设计师"
        responsibility: "定义交互层面的联动行为"
      - role: "前端开发"
        responsibility: "确认规则的可实现性和性能影响（如频繁联动触发）"
    how:
      - "从 L1.6 业务规则目录中提取需要在 UI 层呈现/执行的规则"
      - "定义联动规则：字段 A 变化 → 字段 B 的显示/可选项/值/校验规则变化"
      - "定义校验规则：必填、格式、范围、跨字段校验、异步校验（如重名检测）"
      - "定义状态机：业务对象的状态及合法状态转换路径（用 UML 状态图）"
      - "每条功能规则标注引用的业务规则编号（BR-xxx），保持可追溯"
    rules:
      - "L3 功能规则不重复定义业务规则本体，只引用和 UI 化"
      - "状态机的每个转换必须标注触发者和前置条件"
      - "校验规则分为：前端即时校验（用户体验）+ 后端强制校验（安全保障），缺一不可"
      - "联动规则必须考虑循环触发（A→B→C→A）并明确防护策略"
    presentation:
      format: "状态机图 + 规则映射表 + 校验规则清单"
      template: |
        | 规则ID | 引用BR | 页面/组件 | 触发条件 | 执行动作 | 校验/联动 |
        | FR-042 | BR-001 | 订单创建.提交按钮 | 金额>5万 | 弹出审批确认 | 联动 |
        | FR-101 | BR-033 | 订单.邮箱字段 | 失焦 | 格式正则+异步唯一性 | 校验 |
    audience:
      - "前端开发（联动和校验实现依据）"
      - "后端开发（后端校验和状态机实现）"
      - "测试团队（功能测试和边界测试用例来源）"
    why: "联动规则 90% 是 Bug 的来源——显式建模联动和状态机可以消除大部分交互缺陷。"
    pre_process:
      - "业务规则目录（1.6 输出）"
      - "原型 & UI规格（3.2 输出）—— 确定交互组件"
      - "接口契约（3.3 输出）—— 异步校验的 API"
    post_process:
      - "前端实现校验规则（表单库 schema）"
      - "后端实现校验规则和状态机"
      - "测试团队编写规则覆盖测试矩阵"
    roles:
      - "UX 设计师：补充交互层面的联动细节"
      - "后端 Lead：确认后端强制校验的范围"
      - "测试工程师：设计边界用例"
    quality:
      - "每条功能规则可追溯到 L1.6 业务规则编号"
      - "状态机的所有合法转换路径已枚举（非法的也标注了）"
      - "循环联动路径已检查，有防护机制"
    input:
      - "业务规则目录（1.6 输出）"
      - "原型交互规格（3.2 输出）"
      - "接口契约（3.3 输出）"
    output:
      - "UML 状态机图"
      - "功能规则映射表"
      - "校验规则清单"

  # ==========================================================================
  # 3.5 集成关系
  # ==========================================================================
  integration_relationships:
    order: 5
    name: "集成关系"
    summary: "系统间调用拓扑、时序和依赖关系——谁调用谁，以什么顺序"
    who:
      - role: "集成架构师 / 后端架构师"
        responsibility: "主导绘制集成拓扑和时序"
      - role: "业务分析师 (BA)"
        responsibility: "确认业务流程中的跨系统交互点"
    how:
      - "从系统上下文图（1.2）和数据流向图（2.5）提取所有系统间连接"
      - "绘制集成拓扑图：各系统的调用关系、通信模式（同步/异步/事件驱动）"
      - "对关键跨系统场景绘制时序图（Sequence Diagram）"
      - "标注每个集成的技术协议（REST/gRPC/MQ/WebSocket/FTP）"
      - "标注故障模式：超时策略、重试次数、熔断阈值、降级兜底"
      - "标注系统间的 SLA 依赖链（A 依赖 B，B 的 P99 决定了 A 的 P99）"
    rules:
      - "同步调用链不超过 3 层（否则改为异步解耦）"
      - "每个跨系统调用标注超时时间和失败处理策略"
      - "循环依赖绝对禁止——集成拓扑必须是有向无环图 (DAG)"
      - "第三方外部系统的 SLA 必须书面记录，不可口头假设"
    presentation:
      format: "集成拓扑图 + 关键场景时序图 + 集成清单表"
      template: |
        | 集成ID | 调用方 | 被调用方 | 协议 | 模式 | 超时 | 重试 | 降级 | SLA依赖 |
    audience:
      - "后端/集成开发团队（实现依据）"
      - "SRE/运维（监控和告警配置）"
      - "架构师（评审耦合度和故障域）"
    why: "集成是分布式系统最大的故障源。显式建模每个调用链的故障模式，才是真正可落地的架构。"
    pre_process:
      - "系统上下文图（1.2 输出）"
      - "数据流向图（2.5 输出）"
      - "接口契约（3.3 输出）"
    post_process:
      - "集成测试用例设计（Mock 外部依赖）"
      - "混沌工程实验设计（注入集成故障）"
      - "SLA 监控看板配置"
    roles:
      - "SRE：确认超时/重试/熔断参数的合理性"
      - "安全架构师：审查跨系统调用的认证链路"
      - "测试 Lead：设计集成故障注入场景"
    quality:
      - "集成拓扑为 DAG（无循环依赖）"
      - "所有跨系统调用有超时和失败处理策略"
      - "第三方外部系统有书面 SLA 文档"
    input:
      - "系统上下文图（1.2 输出）"
      - "数据流向图（2.5 输出）"
      - "接口契约（3.3 输出）"
    output:
      - "集成拓扑图"
      - "关键场景时序图"
      - "集成清单表（含故障模式）"

  # ==========================================================================
  # 3.6 外部接口定义
  # ==========================================================================
  external_interfaces:
    order: 6
    name: "外部接口定义"
    summary: "与第三方系统的接口适配——API/消息队列/文件交换/协议适配层"
    who:
      - role: "集成开发工程师 / 后端开发"
        responsibility: "定义适配层接口和协议转换"
      - role: "第三方系统对接人"
        responsibility: "提供外部系统的 API 文档和变更通知"
    how:
      - "从集成关系（3.5）中提取所有涉及第三方的集成点"
      - "定义适配层：协议转换（如外部 SOAP → 内部 REST）、数据格式映射"
      - "定义文件交换规范：文件格式、编码、分隔符、压缩方式、传输方式（SFTP/OSS）"
      - "定义消息队列规范：Topic/Queue 命名、消息格式 Schema、消费确认机制"
      - "确认第三方系统的 API 版本策略和废弃时间表"
      - "定义外部接口的测试沙箱/ Mock 方案"
    rules:
      - "外部接口必须建立防腐层（Anti-Corruption Layer）——外部模型不泄漏到内部"
      - "外部系统的 SLA 和接口限流必须文档化"
      - "文件交换必须包含校验机制（文件行数/金额汇总 checksum）"
      - "外部接口的变更通知机制必须在合同/SLA 中约定"
    presentation:
      format: "外部接口规范文档 + 协议适配说明 + 文件交换字段映射表"
      template: |
        | 接口ID | 外部系统 | 协议 | 入参映射 | 出参映射 | 错误处理 | 测试沙箱 |
    audience:
      - "集成开发团队（实现和适配依据）"
      - "第三方系统开发方（接口共识）"
      - "测试团队（Mock 和集成测试）"
      - "运维团队（文件传输监控）"
    why: "外部系统是不可控的——防腐层是唯一防火墙，防止外部 API 变更击穿内部系统。"
    pre_process:
      - "集成关系拓扑（3.5 输出）"
      - "第三方系统 API 文档 / SDK 文档"
      - "接口契约（3.3 输出）—— 内部接口标准"
    post_process:
      - "防腐层开发和单元测试"
      - "外部接口集成测试（含故障模拟）"
      - "外部接口监控和告警配置"
    roles:
      - "第三方技术支持：确认接口文档和测试环境"
      - "安全架构师：审查第三方接口的数据安全"
      - "SRE：配置文件传输的定时任务和监控"
    quality:
      - "所有外部接口定义了防腐层"
      - "文件交换的校验机制（checksum）已设计"
      - "外部系统测试沙箱可用且文档准确"
    input:
      - "集成关系清单（3.5 输出）"
      - "第三方系统 API 文档"
      - "文件交换需求说明"
    output:
      - "外部接口规范文档"
      - "防腐层设计说明"
      - "文件交换规范和校验规则"

# ============================================================================
# L4: 技术架构 — How Well（质量属性与约束）
# 约束层。回答：系统要多快？要多安全？要多少可用？迁移要怎么做？
# ============================================================================
technology_architecture:
  layer: 4
  name: "技术架构"
  tagline: "How Well — 质量属性与约束"
  principle: "非功能需求决定了系统的上限，而功能需求只决定了下限"

  # ==========================================================================
  # 4.1 性能需求
  # ==========================================================================
  performance:
    order: 1
    name: "性能需求"
    summary: "响应时间、吞吐量、并发能力、资源占用的量化指标"
    who:
      - role: "架构师 / 性能工程师"
        responsibility: "定义性能指标和压测方案"
      - role: "产品负责人 (PO)"
        responsibility: "确认用户体验可接受的性能基线"
      - role: "SRE / 运维"
        responsibility: "确认基础设施能否支撑"
    how:
      - "从用户故事（1.7）中高频场景提取性能敏感点"
      - "定义 P50/P95/P99 延迟（区分读和写）"
      - "定义系统吞吐量：TPS/QPS（按业务高峰+20% 冗余）"
      - "定义并发用户数、连接池大小、线程池配置"
      - "定义资源约束：CPU/内存/磁盘/网络带宽上限"
      - "标注性能测试场景和压测数据准备方案"
    rules:
      - "性能指标必须分场景（列表查询 ≠ 报表导出），不可一个数覆盖所有"
      - "P99 延迟比 P50 更重要（长尾决定了用户体验）"
      - "高峰值必须基于业务数据推算，不可随意设定"
      - "所有性能指标必须可被压测验证（JMeter / k6 / Locust）"
    presentation:
      format: "性能需求表 + 性能测试场景矩阵"
      template: |
        | 场景 | 指标 | 基线 | P95目标 | P99目标 | 并发 | 时限 | 备注 |
        | 订单列表查询 | 响应时间 | <200ms | <500ms | <1s | 1000 | Q3末 | 单页20条 |
    audience:
      - "后端开发（代码优化目标）"
      - "DBA（索引和查询优化）"
      - "SRE（容量规划）"
      - "测试团队（性能测试基准）"
    why: "性能是隐式需求——没有人会写在用户故事里，但慢了就是慢了，用户会用脚投票。"
    pre_process:
      - "业务目标（1.1）—— 用户量和增长预期"
      - "系统功能树（3.1）—— 识别高频使用功能"
      - "物理数据模型（2.3）—— 数据量级估算"
    post_process:
      - "性能压测脚本编写和执行"
      - "压测结果与指标对比，生成性能测试报告"
      - "性能瓶颈分析与优化迭代"
    roles:
      - "性能测试工程师：编写和执行压测"
      - "DBA：优化慢查询"
      - "SRE：配置弹性伸缩策略"
    quality:
      - "每个核心 API 有 P50/P95/P99 指标"
      - "并发目标基于业务数据推算，有计算过程"
      - "压测方案覆盖读、写、混合场景"
    input:
      - "业务目标 KPI 列表（1.1 输出）"
      - "系统功能树（3.1 输出）"
      - "物理数据模型 & 数据增长估算（2.3 输出）"
    output:
      - "性能需求指标表"
      - "性能测试场景矩阵"
      - "压测方案文档"

  # ==========================================================================
  # 4.2 安全需求
  # ==========================================================================
  security:
    order: 2
    name: "安全需求"
    summary: "认证、授权、加密、审计、漏洞防护的全面安全要求"
    who:
      - role: "安全架构师"
        responsibility: "主导安全需求定义和威胁建模"
      - role: "产品负责人 (PO)"
        responsibility: "确认安全性与用户体验的平衡点"
      - role: "法务/合规"
        responsibility: "确认法规要求的安全标准"
    how:
      - "威胁建模 (STRIDE)：欺骗/篡改/抵赖/信息披露/拒绝服务/权限提升"
      - "定义认证策略：MFA 多因素认证、SSO 集成、会话管理"
      - "定义授权策略：RBAC/ABAC，与 L1.4 角色权限矩阵对齐"
      - "定义加密策略：传输加密(TLS 1.3)、存储加密(AES-256)、密钥管理(KMS)"
      - "定义审计策略：谁、何时、做了什么（覆盖所有敏感操作）"
      - "定义安全编码规范：OWASP Top 10 防护、依赖漏洞扫描、SAST/DAST 集成"
      - "定义漏洞响应流程：发现→评级→修复→验证的 SLA"
    rules:
      - "认证和授权必须服务端校验，前端校验只是 UX 优化（不可替代安全）"
      - "所有外部输入必须在信任边界校验（输入消毒）"
      - "敏感操作（删除/导出/提权）必须留审计日志"
      - "密钥和凭证绝不存代码/配置文件，必须用 KMS/环境变量/Secret Manager"
      - "第三方依赖定期扫描高危漏洞（CVE 评分 ≥ 7.0 限期修复）"
    presentation:
      format: "威胁模型文档 + 安全需求矩阵 + 审计日志规范"
      template: |
        | 安全域 | 需求 | 威胁场景 | 防护措施 | 优先级 | 合规引用 |
    audience:
      - "开发团队（安全编码依据）"
      - "安全测试团队（渗透测试用例）"
      - "合规/审计（安全检查清单）"
      - "运维团队（安全配置基线）"
    why: "安全不是功能，是属性。事后打补丁的成本是设计阶段就考虑的 30 倍（IBM 数据）。"
    pre_process:
      - "角色权限矩阵（1.4 输出）"
      - "数据分类分级（2.7 输出）"
      - "数据流向图（2.5 输出）—— PII 流"
      - "法规合规清单"
    post_process:
      - "威胁建模评审会（安全架构师 + 开发 Lead + 运维）"
      - "安全编码规范纳入 CI（SAST 门禁）"
      - "渗透测试执行"
    roles:
      - "安全架构师：威胁建模和防护方案"
      - "合规官：法规对标验收"
      - "渗透测试工程师：黑/白盒测试"
    quality:
      - "STRIDE 六类威胁每类至少识别 2 个场景"
      - "关键 API 路径通过威胁建模"
      - "CVE 扫描策略定稿（频率和修复 SLA）"
    input:
      - "角色权限矩阵（1.4 输出）"
      - "数据分类分级（2.7 输出）"
      - "OWASP Top 10 / 行业安全标准"
    output:
      - "安全需求文档"
      - "威胁模型文档 (STRIDE)"
      - "安全编码规范"
      - "审计日志规范"

  # ==========================================================================
  # 4.3 可用性需求
  # ==========================================================================
  availability:
    order: 3
    name: "可用性需求"
    summary: "SLA 目标、RTO/RPO、容灾方案、降级与熔断策略"
    who:
      - role: "SRE / 架构师"
        responsibility: "定义可用性指标和容灾架构"
      - role: "产品负责人 (PO)"
        responsibility: "确认业务可接受的宕机时长"
      - role: "运维团队"
        responsibility: "确认运维能力和预算是否支撑目标"
    how:
      - "定义可用性 SLA：99.9%（年宕机 8.76h）/ 99.99%（52.6min）/ 99.999%（5.26min）"
      - "定义 RTO (恢复时间目标) 和 RPO (数据丢失目标)"
      - "定义降级策略：哪些功能在故障时可降级（如关闭推荐，保留核心交易）"
      - "定义熔断策略：熔断阈值、半开探测、恢复条件"
      - "定义容灾架构：主备/多活/两地三中心"
      - "定义故障演练计划：混沌工程实验、灾备切换演练频率"
    rules:
      - "SLA 目标必须根据业务影响分级——支付系统 99.999% vs 报表系统 99.9%"
      - "RPO 和 RTO 必须经过演练验证，不可仅凭纸面设计"
      - "降级方案必须有自动触发和自动恢复机制（减少人工干预延时）"
      - "故障演练至少每季度 1 次"
    presentation:
      format: "SLA 分级表 + 降级策略矩阵 + 容灾架构图"
      template: |
        | 子系统 | SLA | RTO | RPO | 降级策略 | 熔断阈值 | 演练频率 |
    audience:
      - "SRE/运维（容灾和演练计划）"
      - "架构师（评审高可用架构）"
      - "业务方/PO（确认可接受的宕机成本）"
    why: "没有 SLA 的系统就是在赌运气。SLA 把模糊的'不能挂'变成可衡量、可验证的指标。"
    pre_process:
      - "业务目标（1.1）—— 业务的停机成本"
      - "集成关系拓扑（3.5）—— 外部依赖"
      - "物理数据模型（2.3）—— 数据备份和恢复策略"
    post_process:
      - "容灾架构搭建和演练"
      - "监控和告警规则配置"
      - "On-Call 值班制度和升级路径建立"
    roles:
      - "SRE：容灾和监控方案实施"
      - "DBA：数据库主备和备份策略"
      - "业务方：确认降级优先级（哪些功能可以先牺牲）"
    quality:
      - "各子系统有明确的分级 SLA（非一刀切）"
      - "RTO/RPO 有对应的技术方案支撑（非空头承诺）"
      - "降级和熔断策略经架构评审通过"
    input:
      - "业务目标 KPI（1.1 输出）"
      - "集成关系拓扑（3.5 输出）"
      - "基础设施能力评估报告"
    output:
      - "SLA 分级表"
      - "容灾架构方案"
      - "降级和熔断策略文档"
      - "故障演练计划"

  # ==========================================================================
  # 4.4 可扩展性需求
  # ==========================================================================
  scalability:
    order: 4
    name: "可扩展性需求"
    summary: "水平/垂直扩展策略、多租户架构、插件机制、未来容量规划"
    who:
      - role: "架构师"
        responsibility: "定义扩展策略和容量规划"
      - role: "SRE"
        responsibility: "确认弹性伸缩方案的运维可行性"
    how:
      - "定义水平扩展策略：无状态服务可水平扩展，有状态服务如何分片"
      - "定义垂直扩展上限和触发条件"
      - "设计多租户方案：数据库隔离/Schema 隔离/行级隔离"
      - "定义插件/扩展机制：热插拔、SPI、自定义扩展点"
      - "3 年容量规划：用户增长→数据增长→计算资源增长的关联推算"
      - "定义弹性伸缩的触发规则（CPU>70% 自动扩容）和冷却期"
    rules:
      - "无状态优先原则：能做成无状态的服务不全做成无状态"
      - "多租户的数据隔离级别必须与 L2.7 数据分级保持一致"
      - "插件机制必须有安全沙箱（不信任第三方插件直接访问核心数据）"
      - "容量规划必须每年更新一次，基于实际运行数据校准"
    presentation:
      format: "扩展方案图 + 容量规划表 + 多租户架构图"
      template: |
        | 服务 | 当前实例数 | 扩展上限 | 扩展触发 | 冷却时间 | 3年后预估实例数 |
    audience:
      - "架构师（设计方案评审）"
      - "SRE/运维（容量管理和采购规划）"
      - "CTO/技术负责人（预算规划依据）"
    why: "扩展性是'设计出来的'，不是'优化出来的'——一个不可水平扩展的系统，优化只能延缓崩溃。"
    pre_process:
      - "性能需求（4.1 输出）—— 并发和吞吐量基线"
      - "物理数据模型（2.3）—— 数据增长估算"
      - "业务目标（1.1）—— 用户增长预期"
    post_process:
      - "弹性伸缩配置和测试"
      - "容量告警阈值配置"
      - "多租户隔离验证"
    roles:
      - "SRE：弹性伸缩配置实施"
      - "DBA：数据分片和扩展方案"
      - "安全架构师：多租户隔离安全审计"
    quality:
      - "核心服务均有水平扩展方案（非仅垂直扩展）"
      - "多租户数据隔离方案经安全审计"
      - "3 年容量规划有模型和数据支撑"
    input:
      - "性能需求指标（4.1 输出）"
      - "数据增长估算（2.3 输出）"
      - "用户增长预期（1.1 输出）"
    output:
      - "扩展方案文档"
      - "3 年容量规划表"
      - "多租户架构设计"

  # ==========================================================================
  # 4.5 兼容与迁移需求
  # ==========================================================================
  migration_compatibility:
    order: 5
    name: "兼容与迁移需求"
    summary: "数据迁移策略、系统并行期方案、版本兼容矩阵、废弃时间表"
    who:
      - role: "架构师 / 迁移负责人"
        responsibility: "主导迁移方案设计和风险评估"
      - role: "DBA"
        responsibility: "主导数据迁移脚本和校验"
      - role: "业务方"
        responsibility: "确认并行期的业务操作流程"
    how:
      - "数据迁移：全量迁移、增量同步、数据校验、回滚方案"
      - "系统并行策略：新旧系统并行运行的时间窗口和切换方案"
      - "版本兼容矩阵：哪些客户端版本兼容哪些后端版本"
      - "API 废弃策略：旧版 API 的支持窗口和 sunset 时间表"
      - "迁移演练：在测试环境完整演练至少 2 次"
      - "回滚方案：迁移失败时的回滚步骤和时间预估"
    rules:
      - "迁移必须有回滚方案，且回滚时间 ≤ RTO"
      - "数据迁移完成后必须有校验脚本（行数/金额/checksum 对账）"
      - "并行期的数据一致性必须有监控（双写冲突检测）"
      - "API 废弃必须提前通知（至少 2 个版本周期），不可突然中断"
    presentation:
      format: "迁移路线图 + 并行期切换方案图 + 版本兼容矩阵"
      template: |
        | 迁移阶段 | 时间窗口 | 操作 | 负责人 | 风险 | 回滚方案 | 校验方法 |
    audience:
      - "开发团队（迁移脚本和兼容代码开发）"
      - "DBA（数据迁移执行）"
      - "运维团队（并行期环境保障）"
      - "业务方（并行期操作培训）"
      - "PM（迁移时间线和里程碑）"
    why: "迁移是最容易被忽视的需求。不做并行和回滚方案的迁移 = 赌博。"
    pre_process:
      - "物理数据模型（2.3 输出）—— 新旧模型差异"
      - "数据字典（2.4 输出）—— 字段映射」
      - "可用性需求（4.3 输出）—— RTO/RPO 约束"
    post_process:
      - "迁移演练（测试环境至少 2 次完整执行）"
      - "并行期监控和告警配置"
      - "切换审批（Go/No-Go 决策会议）"
    roles:
      - "DBA：迁移脚本编写和性能优化"
      - "SRE：并行期环境保障"
      - "业务方 SME：并行期操作流程和校验验收"
    quality:
      - "迁移有完整回滚方案，回滚时间验证过"
      - "数据校验脚本行数/金额对账通过"
      - "并行期数据一致性监控已配置"
    input:
      - "物理数据模型新旧差异（2.3）"
      - "可用性 SLA/RTO/RPO（4.3 输出）"
      - "现有系统接口清单"
    output:
      - "迁移方案文档（含回滚方案）"
      - "数据校验脚本"
      - "并行期切换方案"
      - "版本兼容矩阵"

  # ==========================================================================
  # 4.6 合规与审计需求
  # ==========================================================================
  compliance_audit:
    order: 6
    name: "合规与审计需求"
    summary: "法规标准对齐、审计日志规范、数据驻留要求、合规认证目标"
    who:
      - role: "法务/合规官 (DPO)"
        responsibility: "主导法规对标和合规清单确认"
      - role: "安全架构师"
        responsibility: "将法规要求转化为技术控制措施"
      - role: "产品负责人 (PO)"
        responsibility: "确认合规对产品功能的影响"
    how:
      - "识别适用的法规标准：GDPR/PIPL/PCI-DSS/SOC2/ISO 27001/等保"
      - "逐条对标：每条法规要求 → 对应的技术措施 → 责任人和完成期限"
      - "定义审计日志的完整性要求：谁、何时、做了什么、结果、来源 IP"
      - "定义数据驻留策略：哪些数据必须存储在特定地理区域"
      - "定义数据主体权利响应流程：数据导出/删除/更正（DSAR）"
      - "定义合规认证计划：目标认证、时间线和审计窗口"
    rules:
      - "审计日志不可被篡改或删除 —— WORM (Write Once Read Many) 存储"
      - "审计日志保留期满足最严格的适用法规（通常 1-7 年）"
      - "跨境数据传输必须有合法的传输机制（SCC/BCR）"
      - "合规需求变更时（新法规出台）必须在 30 天内完成影响评估"
    presentation:
      format: "法规对标矩阵 + 审计日志规范 + 数据驻留地图"
      template: |
        | 法规 | 条款 | 要求 | 技术控制措施 | 责任人 | 完成期限 | 合规状态 |
    audience:
      - "法务/合规团队（验收合规状态）"
      - "开发团队（审计日志和合规功能实现）"
      - "外部审计师（合规审计证据）"
      - "管理层（合规风险评估）"
    why: "合规不是技术问题，是法律问题。不合规的成本（罚款+声誉）远超合规的投入。"
    pre_process:
      - "法规律师出具的适用法规清单"
      - "数据分类分级（2.7 输出）"
      - "系统上下文图（1.2 输出）—— 数据跨境路径"
    post_process:
      - "合规审计（内部 + 外部）"
      - "审计日志存储和检索方案实现"
      - "DSAR 流程上线测试"
    roles:
      - "DPO / 法务：法规解读和对标"
      - "安全架构师：技术控制措施设计"
      - "外部审计师：合规认证审计"
    quality:
      - "全部适用法规有逐条对标记录，无遗漏"
      - "审计日志满足 WORM 要求"
      - "数据驻留策略明确，跨境路径已报批"
    input:
      - "适用法规清单"
      - "数据分类分级（2.7 输出）"
      - "系统架构和部署拓扑"
    output:
      - "法规对标矩阵"
      - "审计日志规范文档"
      - "数据驻留策略"
      - "合规认证计划"

  # ==========================================================================
  # 4.7 运维需求
  # ==========================================================================
  operations:
    order: 7
    name: "运维需求"
    summary: "监控/告警/日志/备份/部署拓扑/灾备切换的运维操作要求"
    who:
      - role: "SRE / 运维工程师"
        responsibility: "主导运维需求和操作手册编写"
      - role: "架构师"
        responsibility: "确认架构的可运维性（Observability）"
      - role: "开发 Lead"
        responsibility: "提供应用级健康检查和指标暴露"
    how:
      - "定义监控指标体系：RED（Rate/Error/Duration）+ USE（Utilization/Saturation/Errors）"
      - "定义告警规则和升级路径：警告→严重→紧急，不同级别的通知渠道和响应 SLA"
      - "定义日志规范：结构化日志（JSON）、日志级别、采集管道、保留策略"
      - "定义备份策略：全量/增量/差异备份的频率、保留周期、异地存储"
      - "绘制部署拓扑图：网络、服务器、容器、负载均衡、数据库、中间件"
      - "定义灾备切换操作手册：步骤清单、执行时间预估、验证检查点"
      - "定义健康检查端点：Liveness（存活）/ Readiness（就绪）/ Startup（启动）"
    rules:
      - "所有生产服务必须有 Liveness 和 Readiness 探针"
      - "告警必须有 actionable 的 Runbook（不是'xxx 异常，请人工查看'）"
      - "日志必须结构化（JSON），含 trace_id 实现全链路追踪"
      - "备份恢复必须定期演练（至少每季度 1 次）"
      - "运维手册必须是可执行的（步骤编号 + 预期输出 + 异常处理）"
    presentation:
      format: "部署拓扑图 + 监控指标看板设计 + 告警升级矩阵 + 灾备 Runbook"
      template: |
        | 告警名称 | 级别 | 触发条件 | 通知方式 | 响应 SLA | Runbook 链接 |
    audience:
      - "SRE/运维团队（日常运维依据）"
      - "开发团队（健康检查实现和日志规范）"
      - "管理层（运维成本和服务水平可见）"
    why: "开发完成只是 20%。剩下 80% 的生命周期都在运维。不设计运维需求 = 线上没人管。"
    pre_process:
      - "可用性 SLA（4.3 输出）"
      - "安全需求审计日志规范（4.2 输出）"
      - "集成关系拓扑（3.5 输出）—— 需要监控的外部依赖"
    post_process:
      - "监控看板和告警规则上线"
      - "灾备切换演练执行"
      - "On-Call 排班制度建立"
    roles:
      - "SRE：监控和告警配置实施"
      - "DBA：数据库备份和恢复演练"
      - "安全架构师：日志和审计合规检查"
    quality:
      - "所有生产服务有 Liveness + Readiness 探针"
      - "告警规则对应 Runbook（可执行操作手册）"
      - "备份恢复至少演练 1 次并记录结果"
    input:
      - "可用性 SLA（4.3 输出）"
      - "安全需求（4.2 输出）"
      - "集成关系拓扑（3.5 输出）"
    output:
      - "部署拓扑图"
      - "监控和告警方案"
      - "日志规范文档"
      - "备份与灾备操作手册"

